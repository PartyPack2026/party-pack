<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Party Pack — Join</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');

  :root {
    --purple: #6c3fc5;
    --pink: #e8357a;
    --yellow: #ffd93d;
    --teal: #00c9a7;
    --orange: #ff6b35;
    --dark: #1a1a2e;
    --card: #16213e;
    --text: #eaf4fb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .screen {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; gap: 20px;
    display: none;
  }

  .screen.active { display: flex; }

  h1 { font-family: 'Fredoka One', cursive; font-size: 36px;
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  h2 { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--yellow); text-align: center; }

  .subtitle { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }

  input {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800;
    padding: 16px 20px; width: 100%; max-width: 340px;
    outline: none; transition: border-color 0.2s;
    text-align: center; letter-spacing: 4px; text-transform: uppercase;
  }

  input:focus { border-color: var(--purple); }
  input.name-input { letter-spacing: normal; text-transform: none; }

  .btn {
    width: 100%; max-width: 340px; padding: 18px;
    border-radius: 100px; border: none;
    font-family: 'Fredoka One', cursive; font-size: 22px;
    cursor: pointer; transition: all 0.2s; color: white;
  }

  .btn-primary { background: linear-gradient(135deg, var(--purple), var(--pink)); }
  .btn-primary:hover { transform: scale(1.03); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    background: rgba(255,255,255,0.1); font-size: 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800;
  }

  .btn-answer {
    background: var(--card); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px 20px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px;
    cursor: pointer; transition: all 0.15s; color: var(--text);
    width: 100%; text-align: left;
    display: flex; align-items: center; gap: 12px;
  }

  .btn-answer:active { transform: scale(0.97); }

  .btn-answer.selected {
    border-color: var(--teal);
    background: rgba(0,201,167,0.15);
  }

  .btn-answer .opt-letter {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--purple); display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 16px; flex-shrink: 0;
  }

  /* Text area */
  textarea {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700;
    padding: 16px 20px; width: 100%; max-width: 340px;
    outline: none; resize: none; height: 120px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--purple); }

  /* Drawing canvas */
  #draw-canvas {
    border-radius: 16px;
    background: white;
    touch-action: none;
    width: 100%;
    max-width: 360px;
    height: 280px;
    cursor: crosshair;
  }

  .draw-tools {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    justify-content: center; max-width: 360px; width: 100%;
  }

  .color-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent;
    cursor: pointer; transition: border-color 0.15s;
  }

  .color-btn.active { border-color: white; }

  .size-btn {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
    border-radius: 100px; padding: 6px 14px; cursor: pointer;
    color: white; font-weight: 800; font-size: 13px; transition: all 0.15s;
  }
  .size-btn.active { background: var(--purple); border-color: var(--purple); }

  .eraser-btn {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.15);
    border-radius: 100px; padding: 6px 14px; cursor: pointer;
    color: white; font-weight: 800; font-size: 13px;
  }
  .eraser-btn.active { background: var(--orange); border-color: var(--orange); }

  /* Avatar + lobby */
  .avatar-big { font-size: 72px; text-align: center; }
  .player-name-big { font-family: 'Fredoka One', cursive; font-size: 28px; text-align: center; }

  .room-code-small {
    background: rgba(255,255,255,0.08); border-radius: 100px;
    padding: 6px 16px; font-size: 14px; color: #888; font-weight: 700;
    letter-spacing: 2px;
  }

  .waiting-anim {
    display: flex; gap: 8px; justify-content: center; align-items: center;
    margin-top: 8px;
  }

  .waiting-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--purple);
    animation: bounce 1s infinite;
  }
  .waiting-dot:nth-child(2) { animation-delay: 0.2s; background: var(--pink); }
  .waiting-dot:nth-child(3) { animation-delay: 0.4s; background: var(--yellow); }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .prompt-card {
    background: var(--card); border-radius: 20px; padding: 20px;
    font-size: 16px; font-weight: 800; text-align: center;
    line-height: 1.4; max-width: 340px; width: 100%;
    color: var(--yellow);
  }

  .status-msg { color: #888; font-size: 14px; font-weight: 700; text-align: center; }

  .error-msg { color: var(--pink); font-size: 14px; font-weight: 800; text-align: center; }

  /* Ranking drag UI */
  .rank-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 340px; }
  .rank-item {
    background: var(--card); border-radius: 14px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; cursor: grab;
    border: 2px solid rgba(255,255,255,0.1);
    font-weight: 800; font-size: 15px;
    user-select: none; transition: background 0.15s;
  }
  .rank-item:active { cursor: grabbing; background: rgba(108,63,197,0.3); }
  .rank-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--purple); display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 14px; flex-shrink: 0;
  }
  .drag-handle { color: #555; font-size: 18px; margin-left: auto; }

  /* Eliminated screen */
  .elim-icon { font-size: 80px; text-align: center; }

  /* Char counter */
  .char-count { font-size: 12px; color: #666; font-weight: 700; }

  .btn-done {
    background: linear-gradient(135deg, var(--teal), #00a8cc);
    border: none; color: white; padding: 14px 32px; border-radius: 100px;
    font-family: 'Fredoka One', cursive; font-size: 20px;
    cursor: pointer; width: 100%; max-width: 340px;
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="screen-join" class="screen active">
  <h1>🎉 Party Pack</h1>
  <div class="subtitle">Enter room code</div>
  <input type="text" id="room-code-input" placeholder="XXXX" maxlength="4"/>
  <input type="text" class="name-input" id="nickname-input" placeholder="Your name" maxlength="14" style="letter-spacing:normal; text-transform:none;"/>
  <button class="btn btn-primary" onclick="joinRoom()">Join Game</button>
  <div class="error-msg" id="join-error"></div>
</div>

<!-- LOBBY WAITING -->
<div id="screen-lobby" class="screen">
  <div class="avatar-big" id="my-avatar">🦊</div>
  <div class="player-name-big" id="my-name">Player</div>
  <div class="room-code-small" id="my-room-code">Room: ----</div>
  <div class="status-msg">Waiting for host to start...</div>
  <div class="waiting-anim">
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
  </div>
</div>

<!-- ANSWER TEXT -->
<div id="screen-answer" class="screen">
  <div class="prompt-card" id="answer-prompt">...</div>
  <textarea id="answer-text" placeholder="Type your answer..." maxlength="80"></textarea>
  <div class="char-count"><span id="char-left">80</span> characters left</div>
  <button class="btn-done" onclick="submitAnswer()">Submit!</button>
  <div class="status-msg" id="answer-status"></div>
</div>

<!-- VOTE CHOICE -->
<div id="screen-vote" class="screen">
  <h2 id="vote-heading">Vote!</h2>
  <div id="vote-options" style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px;"></div>
  <div class="status-msg" id="vote-status"></div>
</div>

<!-- DRAW -->
<div id="screen-draw" class="screen">
  <div class="prompt-card" id="draw-prompt">...</div>
  <canvas id="draw-canvas" width="360" height="280"></canvas>
  <div class="draw-tools">
    <div class="color-btn active" style="background:#222;" onclick="setColor('#222', this)"></div>
    <div class="color-btn" style="background:#e8357a;" onclick="setColor('#e8357a', this)"></div>
    <div class="color-btn" style="background:#6c3fc5;" onclick="setColor('#6c3fc5', this)"></div>
    <div class="color-btn" style="background:#00c9a7;" onclick="setColor('#00c9a7', this)"></div>
    <div class="color-btn" style="background:#ffd93d;" onclick="setColor('#ffd93d', this)"></div>
    <div class="color-btn" style="background:#ff6b35;" onclick="setColor('#ff6b35', this)"></div>
    <button class="size-btn active" onclick="setSize(4, this)">S</button>
    <button class="size-btn" onclick="setSize(10, this)">M</button>
    <button class="size-btn" onclick="setSize(22, this)">L</button>
    <button class="eraser-btn" onclick="toggleEraser(this)">⬜ Erase</button>
  </div>
  <button class="btn-done" onclick="doneDrawing()">Done Drawing!</button>
</div>

<!-- WAIT (spectate) -->
<div id="screen-wait" class="screen">
  <div class="avatar-big" id="wait-avatar">⏳</div>
  <h2 id="wait-heading">Hang tight!</h2>
  <div class="status-msg" id="wait-msg">Others are still going...</div>
  <div class="waiting-anim">
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
    <div class="waiting-dot"></div>
  </div>
</div>

<!-- ELIMINATED -->
<div id="screen-eliminated" class="screen">
  <div class="elim-icon">💀</div>
  <h2>You're Out!</h2>
  <div class="status-msg">Stick around and watch the others...</div>
</div>

<!-- RANKING -->
<div id="screen-rank" class="screen">
  <h2 id="rank-heading">Rank these!</h2>
  <div class="status-msg">Drag to reorder — most popular first</div>
  <div class="rank-list" id="rank-list"></div>
  <button class="btn-done" onclick="submitRanking()">Submit Ranking!</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myPlayer = null;
let myCode = null;
let currentVoteOptions = [];
let selectedVote = null;
let currentRankItems = [];
let drawCanvas, drawCtx, isDrawing = false;
let currentColor = '#222', currentSize = 4, isEraser = false;
let currentStroke = [];

// ─── ROUTING ───────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ─── JOIN ───────────────────────────────────────────
// Pre-fill room code from URL
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('room')) {
  document.getElementById('room-code-input').value = urlParams.get('room').toUpperCase();
}

function joinRoom() {
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  const nickname = document.getElementById('nickname-input').value.trim();
  if (!code || code.length < 4) {
    document.getElementById('join-error').textContent = 'Enter a 4-letter room code!';
    return;
  }
  if (!nickname) {
    document.getElementById('join-error').textContent = 'Enter your name!';
    return;
  }
  socket.emit('join_room', { code, nickname });
}

socket.on('room_joined', ({ code, player }) => {
  myCode = code;
  myPlayer = player;
  document.getElementById('my-avatar').textContent = player.avatar;
  document.getElementById('my-name').textContent = player.nickname;
  document.getElementById('my-room-code').textContent = `Room: ${code}`;
  showScreen('lobby');
});

socket.on('error', ({ message }) => {
  document.getElementById('join-error').textContent = message;
});

socket.on('room_update', ({ phase }) => {
  if (phase === 'lobby') {
    showScreen('lobby');
  }
});

// ─── QUIPLASH ───────────────────────────────────────────
socket.on('your_prompt', ({ prompt }) => {
  document.getElementById('answer-prompt').textContent = prompt;
  document.getElementById('answer-text').value = '';
  document.getElementById('char-left').textContent = '80';
  document.getElementById('answer-status').textContent = '';
  showScreen('answer');
});

document.getElementById('answer-text').addEventListener('input', function() {
  document.getElementById('char-left').textContent = 80 - this.value.length;
});

function submitAnswer() {
  const answer = document.getElementById('answer-text').value.trim();
  if (!answer) return;
  socket.emit('game_input', { type: 'answer', answer });
  document.getElementById('answer-status').textContent = '✅ Submitted! Waiting for others...';
  document.getElementById('answer-text').disabled = true;
  document.querySelector('#screen-answer .btn-done').disabled = true;
}

// ─── VOTING (shared) ───────────────────────────────────────────
socket.on('vote_now', ({ options }) => {
  currentVoteOptions = options;
  selectedVote = null;
  document.getElementById('vote-heading').textContent = 'Which is funnier?';
  document.getElementById('vote-status').textContent = '';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  document.getElementById('vote-options').innerHTML = options.map((o, i) => `
    <button class="btn-answer" onclick="castVote('${o.playerId || o.id}', this)">
      <div class="opt-letter">${letters[i]}</div>
      ${o.answer || o.text}
    </button>
  `).join('');
  showScreen('vote');
});

socket.on('pick_answer', ({ answers }) => {
  currentVoteOptions = answers;
  selectedVote = null;
  document.getElementById('vote-heading').textContent = 'Pick the real answer!';
  document.getElementById('vote-status').textContent = '';
  const letters = ['A','B','C','D','E'];
  document.getElementById('vote-options').innerHTML = answers.map((a, i) => `
    <button class="btn-answer" onclick="castVote('${a.id}', this)">
      <div class="opt-letter">${letters[i]}</div>
      ${a.text}
    </button>
  `).join('');
  showScreen('vote');
});

function castVote(id, btn) {
  if (selectedVote) return;
  selectedVote = id;
  btn.classList.add('selected');
  socket.emit('game_input', { type: 'vote', vote: id, answerId: id });
  document.getElementById('vote-status').textContent = '✅ Voted! Waiting...';
  document.querySelectorAll('.btn-answer').forEach(b => {
    if (b !== btn) b.style.opacity = '0.4';
  });
}

// Wait screens
socket.on('wait_for_vote', () => {
  document.getElementById('wait-avatar').textContent = '👀';
  document.getElementById('wait-heading').textContent = 'You\'re up!';
  document.getElementById('wait-msg').textContent = 'Others are voting on your answer...';
  showScreen('wait');
});

socket.on('wait_for_guesses', () => {
  document.getElementById('wait-avatar').textContent = '🎨';
  document.getElementById('wait-heading').textContent = 'Nice drawing!';
  document.getElementById('wait-msg').textContent = 'Others are guessing what it is...';
  showScreen('wait');
});

socket.on('spectating', ({ question, options }) => {
  // Eliminated players see the question but can't answer
  document.getElementById('wait-avatar').textContent = '💀';
  document.getElementById('wait-heading').textContent = 'Spectating...';
  document.getElementById('wait-msg').textContent = question;
  showScreen('wait');
});

// ─── FIBBAGE ───────────────────────────────────────────
socket.on('enter_lie', ({ prompt }) => {
  document.getElementById('answer-prompt').textContent = prompt;
  document.getElementById('answer-text').value = '';
  document.getElementById('answer-text').disabled = false;
  document.querySelector('#screen-answer .btn-done').disabled = false;
  document.getElementById('char-left').textContent = '80';
  document.getElementById('answer-status').textContent = '';
  showScreen('answer');
});

// Override submit for fibbage
const origSubmit = submitAnswer;
function submitAnswer() {
  const answer = document.getElementById('answer-text').value.trim();
  if (!answer) return;
  socket.emit('game_input', { type: 'answer', answer });
  socket.emit('game_input', { type: 'lie', lie: answer });
  document.getElementById('answer-status').textContent = '✅ Submitted! Waiting for others...';
  document.getElementById('answer-text').disabled = true;
  document.querySelector('#screen-answer .btn-done').disabled = true;
}

// ─── DRAWFUL ───────────────────────────────────────────
socket.on('your_drawing_prompt', ({ prompt }) => {
  document.getElementById('draw-prompt').textContent = prompt;
  initCanvas();
  showScreen('draw');
});

socket.on('enter_guess', () => {
  document.getElementById('answer-prompt').textContent = 'What is this drawing?';
  document.getElementById('answer-text').value = '';
  document.getElementById('answer-text').disabled = false;
  document.querySelector('#screen-answer .btn-done').disabled = false;
  document.getElementById('char-left').textContent = '80';
  document.getElementById('answer-status').textContent = '';
  showScreen('answer');
});

// Override submit for drawful guess
document.querySelector('#screen-answer .btn-done').addEventListener('click', function() {
  const answer = document.getElementById('answer-text').value.trim();
  if (!answer) return;
  socket.emit('game_input', { type: 'answer', answer });
  socket.emit('game_input', { type: 'guess', guess: answer });
  document.getElementById('answer-status').textContent = '✅ Submitted!';
  document.getElementById('answer-text').disabled = true;
  this.disabled = true;
}, { once: false });

function initCanvas() {
  drawCanvas = document.getElementById('draw-canvas');
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.fillStyle = 'white';
  drawCtx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);

  drawCanvas.addEventListener('pointerdown', startDraw);
  drawCanvas.addEventListener('pointermove', draw);
  drawCanvas.addEventListener('pointerup', endDraw);
  drawCanvas.addEventListener('pointerleave', endDraw);
}

function getPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
    nx: (e.clientX - rect.left) / rect.width,
    ny: (e.clientY - rect.top) / rect.height
  };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  currentStroke = [{ x: pos.nx, y: pos.ny, color: isEraser ? 'white' : currentColor, size: isEraser ? 30 : currentSize }];
  drawCtx.beginPath();
  drawCtx.strokeStyle = isEraser ? 'white' : currentColor;
  drawCtx.lineWidth = isEraser ? 30 : currentSize;
  drawCtx.lineCap = 'round';
  drawCtx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  currentStroke.push({ x: pos.nx, y: pos.ny, color: isEraser ? 'white' : currentColor, size: isEraser ? 30 : currentSize });
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke.length > 1) {
    socket.emit('game_input', { type: 'stroke', stroke: currentStroke });
  }
  currentStroke = [];
}

function setColor(color, btn) {
  currentColor = color;
  isEraser = false;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.eraser-btn').classList.remove('active');
  btn.classList.add('active');
}

function setSize(size, btn) {
  currentSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleEraser(btn) {
  isEraser = !isEraser;
  btn.classList.toggle('active');
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
}

function doneDrawing() {
  socket.emit('game_input', { type: 'done_drawing' });
  document.getElementById('wait-avatar').textContent = '✅';
  document.getElementById('wait-heading').textContent = 'Done!';
  document.getElementById('wait-msg').textContent = 'Others are guessing your masterpiece...';
  showScreen('wait');
}

// ─── TRIVIA ───────────────────────────────────────────
socket.on('answer_question', ({ question, options }) => {
  currentVoteOptions = options.map((o, i) => ({ id: o, text: o }));
  selectedVote = null;
  document.getElementById('vote-heading').textContent = question;
  document.getElementById('vote-status').textContent = '';
  const letters = ['A','B','C','D'];
  document.getElementById('vote-options').innerHTML = options.map((o, i) => `
    <button class="btn-answer" onclick="answerTrivia('${o.replace(/'/g, "\\'")}', this)">
      <div class="opt-letter">${letters[i]}</div>
      ${o}
    </button>
  `).join('');
  showScreen('vote');
});

function answerTrivia(answer, btn) {
  if (selectedVote) return;
  selectedVote = answer;
  btn.classList.add('selected');
  socket.emit('game_input', { type: 'answer', answer });
  document.getElementById('vote-status').textContent = '✅ Locked in!';
  document.querySelectorAll('.btn-answer').forEach(b => {
    if (b !== btn) b.style.opacity = '0.4';
  });
}

socket.on('you_are_eliminated', () => {
  showScreen('eliminated');
});

// ─── POLL MINE ───────────────────────────────────────────
socket.on('cast_vote', ({ question, options }) => {
  currentVoteOptions = options.map(o => ({ id: o, text: o }));
  selectedVote = null;
  document.getElementById('vote-heading').textContent = question;
  document.getElementById('vote-status').textContent = '';
  document.getElementById('vote-options').innerHTML = options.map((o, i) => `
    <button class="btn-answer" onclick="castPollVote('${o.replace(/'/g, "\\'")}', this)">
      <span>${o}</span>
    </button>
  `).join('');
  showScreen('vote');
});

function castPollVote(option, btn) {
  if (selectedVote) return;
  selectedVote = option;
  btn.classList.add('selected');
  socket.emit('game_input', { type: 'vote', option });
  document.getElementById('vote-status').textContent = '✅ Voted!';
  document.querySelectorAll('.btn-answer').forEach(b => {
    if (b !== btn) b.style.opacity = '0.4';
  });
}

socket.on('rank_options', ({ question, options }) => {
  currentRankItems = [...options];
  document.getElementById('rank-heading').textContent = question;
  renderRankList();
  showScreen('rank');
});

function renderRankList() {
  const list = document.getElementById('rank-list');
  list.innerHTML = currentRankItems.map((item, i) => `
    <div class="rank-item" draggable="true" data-index="${i}"
      ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)">
      <div class="rank-num">${i + 1}</div>
      <span>${item}</span>
      <span class="drag-handle">⠿</span>
    </div>
  `).join('');
}

let dragSrc = null;
function dragStart(e) { dragSrc = parseInt(e.currentTarget.dataset.index); }
function dragOver(e) { e.preventDefault(); }
function drop(e) {
  e.preventDefault();
  const target = parseInt(e.currentTarget.dataset.index);
  if (dragSrc === null || dragSrc === target) return;
  const item = currentRankItems.splice(dragSrc, 1)[0];
  currentRankItems.splice(target, 0, item);
  dragSrc = null;
  renderRankList();
}

function submitRanking() {
  socket.emit('game_input', { type: 'prediction', ranking: currentRankItems });
  document.getElementById('wait-avatar').textContent = '📊';
  document.getElementById('wait-heading').textContent = 'Ranking submitted!';
  document.getElementById('wait-msg').textContent = 'Waiting for results...';
  showScreen('wait');
}

// ─── GAME OVER ───────────────────────────────────────────
socket.on('game_over', () => {
  document.getElementById('wait-avatar').textContent = '🏆';
  document.getElementById('wait-heading').textContent = 'Game over!';
  document.getElementById('wait-msg').textContent = 'Check the big screen for final results!';
  showScreen('wait');
});

socket.on('game_ended', ({ returnToLobby }) => {
  if (returnToLobby) showScreen('lobby');
});
</script>
</body>
</html>
