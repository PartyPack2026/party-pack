<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couch Pack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--s:#141414;--b:#222;--t:#f5f5f5;--m:#555;--r:#ff2d2d;--g:#00f076;--y:#ffe62d;--o:#ff8c00;--p:#cc2dff}
body{background:var(--bg);color:var(--t);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden}
.screen{display:none;width:100vw;height:100vh;position:relative}
.screen.active{display:flex;flex-direction:column}

/* animated bg */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,230,45,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,230,45,.04) 1px,transparent 1px);
  background-size:60px 60px;animation:gridMove 20s linear infinite}
@keyframes gridMove{from{background-position:0 0}to{background-position:60px 60px}}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,230,45,.07) 0%,transparent 70%);
  top:-150px;left:-150px;animation:floatA 12s ease-in-out infinite}
.bg-glow::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(204,45,255,.05) 0%,transparent 70%);
  bottom:-100px;right:-100px;animation:floatB 15s ease-in-out infinite}
@keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
@keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-60px)}}

/* LOBBY */
#s-lobby{justify-content:space-between;padding-bottom:70px}
.lobby-top{display:flex;align-items:center;justify-content:space-between;padding:clamp(16px,3vh,32px) clamp(20px,4vw,48px);position:relative;z-index:1;flex-wrap:wrap;gap:16px}
.logo{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',cursive;font-size:clamp(42px,6vw,80px);color:var(--y);letter-spacing:4px;
  text-shadow:0 0 40px rgba(255,230,45,.4);animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 20px rgba(255,230,45,.3)}to{text-shadow:0 0 60px rgba(255,230,45,.7),0 0 100px rgba(255,230,45,.2)}}
.logo-sub{font-size:clamp(9px,1.2vw,13px);font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--m)}
.join-info{display:flex;flex-direction:column;align-items:center;gap:6px}
.join-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--m)}
.join-code{font-family:'Bebas Neue',cursive;font-size:clamp(48px,8vw,90px);color:var(--y);letter-spacing:clamp(8px,1.5vw,18px);line-height:1;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.join-url{font-size:clamp(11px,1.4vw,14px);color:var(--y);font-weight:700;letter-spacing:1px}
#qr-img{width:clamp(80px,9vw,120px);height:clamp(80px,9vw,120px);border-radius:8px;border:3px solid var(--b);cursor:pointer;transition:all .2s}
#qr-img:hover{border-color:var(--y);transform:scale(1.08);box-shadow:0 0 20px rgba(255,230,45,.3)}

/* player wall */
.lobby-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:0 clamp(16px,3vw,40px);position:relative;z-index:1;overflow:hidden}
.player-wall{display:flex;flex-wrap:wrap;gap:clamp(8px,1.5vw,16px);justify-content:center;align-items:center;max-width:1000px}
.p-card{background:var(--s);border:2px solid var(--b);border-radius:14px;padding:clamp(12px,2vw,20px) clamp(14px,2.5vw,24px);
  display:flex;flex-direction:column;align-items:center;gap:6px;animation:cardIn .4s cubic-bezier(.34,1.56,.64,1) both;min-width:clamp(90px,12vw,130px)}
@keyframes cardIn{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.p-av{width:clamp(40px,5vw,56px);height:clamp(40px,5vw,56px);border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,3vw,32px);background:var(--b);border:2px solid var(--b)}
.p-av img{width:100%;height:100%;object-fit:cover}
.p-name{font-family:'Bebas Neue',cursive;font-size:clamp(14px,1.8vw,20px);letter-spacing:1px;text-align:center}
.p-score{font-size:11px;color:var(--m);font-weight:700}
.waiting-msg{font-family:'Bebas Neue',cursive;font-size:clamp(18px,3vw,30px);color:var(--m);letter-spacing:3px;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.8}}

/* bottom strip */
.lobby-bottom{padding:clamp(12px,2vh,20px) clamp(16px,3vw,40px);position:relative;z-index:1;display:flex;flex-direction:column;gap:10px}
.game-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.game-strip::-webkit-scrollbar{display:none}
.g-btn{flex-shrink:0;background:var(--s);border:2px solid var(--b);border-radius:12px;
  padding:clamp(10px,1.5vh,16px) clamp(10px,1.5vw,16px);
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:5px;
  min-width:clamp(90px,10vw,120px);position:relative;overflow:hidden}
.g-btn::before{content:'';position:absolute;inset:0;background:var(--y);opacity:0;transition:opacity .18s}
.g-btn:hover::before{opacity:.05}
.g-btn.on{border-color:var(--y)}
.g-btn.on .g-name{color:var(--y)}
.g-icon{width:28px;height:28px;background:var(--b);border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .18s}
.g-btn.on .g-icon{background:var(--y)}
.g-icon svg{width:16px;height:16px;fill:var(--m);transition:fill .18s}
.g-btn.on .g-icon svg{fill:#000}
.g-name{font-family:'Bebas Neue',cursive;font-size:clamp(13px,1.6vw,16px);letter-spacing:1px;color:var(--m);transition:color .18s;white-space:nowrap}
.g-min{font-size:10px;color:var(--m);font-weight:700;letter-spacing:1px;white-space:nowrap}
.lobby-actions{display:flex;gap:10px;align-items:stretch}
.p-count-box{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:clamp(10px,1.5vh,16px) clamp(16px,2vw,24px);display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0}
.p-count-num{font-family:'Bebas Neue',cursive;font-size:clamp(24px,4vw,36px);color:var(--y)}
.p-count-lbl{font-size:11px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px;line-height:1.3}
.start-btn{flex:1;background:var(--y);border:none;border-radius:12px;padding:clamp(12px,1.8vh,18px);
  font-family:'Bebas Neue',cursive;font-size:clamp(20px,3vw,28px);letter-spacing:2px;color:#000;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.start-btn::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .15s}
.start-btn:hover::after{opacity:.08}
.start-btn:active{transform:scale(.98)}
.start-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* QR overlay */
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:pointer}
.qr-overlay.open{display:flex}
.qr-overlay-img{width:min(340px,80vw);height:min(340px,80vw);border-radius:16px;border:4px solid var(--y);box-shadow:0 0 80px rgba(255,230,45,.4)}
.qr-big-label{font-family:'Bebas Neue',cursive;font-size:clamp(22px,4vw,36px);color:var(--y);letter-spacing:4px}
.qr-big-url{font-size:clamp(14px,2.5vw,22px);font-weight:700;color:var(--t)}
.qr-close{font-size:12px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-top:8px}

/* GAME SCREEN */
#s-game{flex-direction:column}
.game-bar{display:flex;align-items:center;justify-content:space-between;padding:10px clamp(16px,3vw,28px);background:var(--s);border-bottom:2px solid var(--b);z-index:10;flex-shrink:0;gap:10px}
.game-bar-left{font-family:'Bebas Neue',cursive;font-size:clamp(16px,2.5vw,24px);letter-spacing:2px;color:var(--y);white-space:nowrap}
.scorebar{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none}
.scorebar::-webkit-scrollbar{display:none}
.s-chip{background:var(--bg);border:2px solid var(--b);border-radius:100px;padding:5px 12px;display:flex;align-items:center;gap:6px;font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0}
.s-chip-av{width:22px;height:22px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--b);flex-shrink:0}
.s-chip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.s-pts{font-family:'Bebas Neue',cursive;font-size:16px;color:var(--y)}
.skip-btn{background:transparent;border:2px solid var(--b);border-radius:8px;padding:6px 12px;color:var(--m);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.skip-btn:hover{border-color:var(--y);color:var(--y)}

/* TV area */
.tv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(16px,3vh,32px);gap:clamp(12px,2vh,20px);overflow:hidden;position:relative;z-index:1}
.tv-label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--m);text-align:center}
.tv-heading{font-family:'Bebas Neue',cursive;font-size:clamp(22px,5vw,60px);text-align:center;color:var(--y);max-width:900px;line-height:1;letter-spacing:1px}
.tv-sub{color:var(--m);font-size:clamp(12px,1.5vw,15px);font-weight:500;text-align:center}
.tv-canvas{border-radius:12px;background:white;max-width:min(680px,90vw);width:100%;height:clamp(220px,35vh,420px);display:block}

/* answer grid */
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,1.5vw,14px);width:100%;max-width:min(960px,95vw)}
.ans-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:clamp(12px,2vw,18px);display:flex;flex-direction:column;gap:6px;transition:all .4s}
.ans-card.win{border-color:var(--g);background:rgba(0,240,118,.06)}
.ans-card.lose{opacity:.3}
.ans-author{font-size:11px;color:var(--m);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ans-text{font-size:clamp(13px,2vw,20px);font-weight:700;line-height:1.3}
.vbar-wrap{height:3px;background:var(--b);border-radius:100px;overflow:hidden;margin-top:4px}
.vbar-fill{height:100%;background:var(--y);border-radius:100px;transition:width 1.2s ease}
.vtally{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--y)}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(6px,1.2vw,10px);width:100%;max-width:min(960px,95vw)}
.opt-tv{background:var(--s);border:2px solid var(--b);border-radius:10px;padding:clamp(10px,1.5vw,14px) clamp(12px,2vw,18px);font-size:clamp(12px,1.6vw,16px);font-weight:700;display:flex;align-items:center;gap:8px;transition:all .3s}
.opt-tv.win{border-color:var(--g);background:rgba(0,240,118,.06)}
.opt-tv.lose{opacity:.3}
.opt-ltr{width:26px;height:26px;border-radius:6px;background:var(--b);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:15px;color:var(--y);flex-shrink:0}

/* poll bars */
.poll-bars{display:flex;flex-direction:column;gap:8px;width:100%;max-width:min(800px,92vw)}
.poll-row{display:flex;flex-direction:column;gap:3px}
.poll-lbl{font-weight:700;font-size:clamp(12px,1.5vw,15px);display:flex;justify-content:space-between}
.poll-track{height:12px;background:var(--b);border-radius:100px;overflow:hidden}
.poll-fill{height:100%;background:linear-gradient(90deg,var(--y),var(--o));border-radius:100px;transition:width 1.2s ease}

/* dots */
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--b);transition:background .3s}
.dot.on{background:var(--g)}

/* reaction bubbles */
.reaction-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.reaction-bubble{position:absolute;bottom:80px;font-size:clamp(28px,5vw,48px);animation:reactionFloat 2.5s ease-out forwards;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}
.reaction-name{font-family:'Bebas Neue',cursive;font-size:12px;color:var(--t);background:rgba(0,0,0,.6);padding:2px 6px;border-radius:4px;white-space:nowrap}
@keyframes reactionFloat{0%{transform:translateY(0) scale(0);opacity:1}20%{transform:translateY(-40px) scale(1.3)}80%{transform:translateY(-180px) scale(1);opacity:1}100%{transform:translateY(-260px) scale(.8);opacity:0}}

/* typing indicators */
.typing-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:24px}
.typing-chip{background:var(--s);border:1px solid var(--b);border-radius:100px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--m);display:flex;align-items:center;gap:6px;animation:popIn .2s ease}
.typing-dots{display:flex;gap:2px}
.typing-dots span{width:4px;height:4px;border-radius:50%;background:var(--m);animation:tdot 1s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* answer reveal drama */
@keyframes revealDrama{0%{transform:scale(.8) translateY(20px);opacity:0;filter:blur(4px)}100%{transform:scale(1) translateY(0);opacity:1;filter:blur(0)}}
.reveal-dramatic{animation:revealDrama .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes countUp{from{transform:scale(1.5);color:var(--g)}to{transform:scale(1)}}
.score-count-up{animation:countUp .5s ease}

/* podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;width:100%;max-width:600px;height:200px}
.podium-slot{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-av{width:56px;height:56px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--b);border:3px solid var(--b);flex-shrink:0}
.podium-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.podium-name{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;text-align:center}
.podium-score{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--y)}
.podium-block{width:100px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:28px}
.podium-1 .podium-block{height:140px;background:var(--y);color:#000;border:3px solid var(--y)}
.podium-2 .podium-block{height:100px;background:#aaa;color:#000}
.podium-3 .podium-block{height:70px;background:#cd7f32;color:#fff}
.podium-other .podium-block{height:50px;background:var(--s);color:var(--m);width:70px}

/* scores */
.scores-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:min(700px,92vw)}
.sr{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:clamp(10px,1.5vh,14px) clamp(14px,2vw,20px);display:flex;align-items:center;gap:12px;animation:slideIn .5s ease both}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.sr-rank{font-family:'Bebas Neue',cursive;font-size:clamp(20px,3vw,28px);color:var(--m);width:40px;text-align:center}
.sr-rank.g{color:var(--y)}.sr-rank.s{color:#aaa}.sr-rank.b{color:#cd7f32}
.sr-av{width:34px;height:34px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--b);flex-shrink:0}
.sr-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sr-name{font-weight:700;font-size:clamp(13px,1.8vw,16px);flex:1}
.sr-pts{font-family:'Bebas Neue',cursive;font-size:clamp(18px,2.5vw,24px);color:var(--y)}

/* mafia */
.mafia-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(90px,12vw,130px),1fr));gap:10px;width:100%;max-width:min(860px,95vw)}
.m-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:5px;font-weight:700;font-size:clamp(11px,1.4vw,14px);text-align:center}
.m-card.dead{opacity:.2;border-style:dashed}
.m-av{width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px);border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,3vw,28px);background:var(--b);flex-shrink:0}
.m-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* hot take */
.hot-take-display{display:flex;gap:clamp(12px,2vw,24px);width:100%;max-width:min(700px,92vw)}
.ht-side{flex:1;border-radius:14px;padding:clamp(16px,3vh,28px);display:flex;flex-direction:column;align-items:center;gap:8px;border:2px solid var(--b)}
.ht-side.hot{border-color:var(--r);background:rgba(255,45,45,.07)}
.ht-side.norm{border-color:var(--g);background:rgba(0,240,118,.06)}
.ht-label{font-family:'Bebas Neue',cursive;font-size:clamp(20px,3vw,32px);letter-spacing:2px}
.ht-count{font-family:'Bebas Neue',cursive;font-size:clamp(40px,7vw,72px);color:var(--y)}

/* mind meld */
.meld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(100px,14vw,160px),1fr));gap:10px;width:100%;max-width:min(900px,95vw)}
.meld-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:12px;text-align:center;font-weight:700;font-size:clamp(12px,1.5vw,15px)}
.meld-card.meld{border-color:var(--y);background:rgba(255,230,45,.08)}
.meld-answer{color:var(--y);font-family:'Bebas Neue',cursive;font-size:clamp(14px,2vw,18px);letter-spacing:1px}
.meld-who{font-size:11px;color:var(--m);margin-top:2px}
.meld-count{font-size:11px;color:var(--g);font-weight:700}

/* voltage */
.volt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(100px,14vw,160px),1fr));gap:10px;width:100%;max-width:min(900px,95vw)}
.volt-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:12px;text-align:center}
.volt-answer{font-family:'Bebas Neue',cursive;font-size:clamp(14px,2vw,20px);letter-spacing:1px;color:var(--t)}
.volt-who{font-size:11px;color:var(--m);margin-top:2px}
.volt-pts{font-size:12px;font-weight:700;margin-top:4px}
.volt-pts.unique{color:var(--y)}
.volt-pts.shared{color:var(--g)}
.volt-pts.none{color:var(--m)}

/* psychic */
.q-chain{display:flex;flex-direction:column;gap:8px;width:100%;max-width:min(700px,92vw);max-height:40vh;overflow-y:auto;scrollbar-width:thin}
.q-row{background:var(--s);border:2px solid var(--b);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:clamp(12px,1.5vw,15px)}
.q-text{font-weight:700;flex:1}
.q-ans{font-family:'Bebas Neue',cursive;font-size:clamp(14px,2vw,18px);color:var(--y);letter-spacing:1px;flex-shrink:0}

/* mole */
.discussion-timer{font-family:'Bebas Neue',cursive;font-size:clamp(60px,10vw,120px);color:var(--y);animation:glow 1s ease-in-out infinite alternate}

/* copycat chain */
.copycat-chain{display:flex;gap:clamp(8px,1.5vw,16px);overflow-x:auto;width:100%;max-width:min(1000px,98vw);padding-bottom:8px;scrollbar-width:thin}
.copycat-card{flex-shrink:0;width:clamp(160px,18vw,220px);display:flex;flex-direction:column;gap:6px}
.copycat-card canvas,.copycat-card img{width:100%;height:clamp(120px,15vw,160px);border-radius:10px;background:white;object-fit:contain}
.copycat-who{font-family:'Bebas Neue',cursive;font-size:clamp(13px,1.6vw,16px);letter-spacing:1px;text-align:center}

/* ticker */
.ticker{position:fixed;bottom:0;left:0;right:0;background:var(--y);padding:5px 0;z-index:100;overflow:hidden}
.ticker-inner{display:flex;gap:60px;animation:tick 30s linear infinite;white-space:nowrap}
.ticker-inner span{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:#000;flex-shrink:0}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* exciting reveals */
@keyframes bounceIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.3}}
.reveal-flash{animation:flash .4s ease 3}
.bounce-in{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}
.ans-card.win{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both!important}

/* pulse */
.pulse{display:flex;gap:6px;justify-content:center}
.pulse span{width:7px;height:7px;border-radius:50%;background:var(--m);animation:pa 1.2s ease-in-out infinite}
.pulse span:nth-child(2){animation-delay:.2s}.pulse span:nth-child(3){animation-delay:.4s}
@keyframes pa{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- QR overlay -->

  <div class="qr-big-label">Scan to Join</div>

<!-- LOBBY -->

        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
        <div class="g-name">Hot Take</div>

      <button class="g-btn" onclick="sel('Voltage','gV')" id="gV">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg></div>
        <div class="g-name">Voltage</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Mole','gMo')" id="gMo">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 1C5.93 1 1 5.93 1 12s4.93 11 11 11 11-4.93 11-11S18.07 1 12 1zm0 4c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></div>
        <div class="g-name">The Mole</div>
        <div class="g-min">4+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Psychic','gPs')" id="gPs">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
        <div class="g-name">Psychic</div>
        <div class="g-min">3+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Copycat','gCc')" id="gCc">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
        <div class="g-name">Copycat</div>
        <div class="g-min">3+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Quiplash','gQ')" id="gQ">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg></div>
        <div class="g-name">Quiplash</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Fibbage','gF')" id="gF">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
        <div class="g-name">Fibbage</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Drawful','gDr')" id="gDr">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
        <div class="g-name">Drawful</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('TriviaKnockout','gTr')" id="gTr">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg></div>
        <div class="g-name">Trivia</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('PollMine','gPm')" id="gPm">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
        <div class="g-name">Poll Mine</div>
        <div class="g-min">2+ players</div>
      </button>
      <button class="g-btn" onclick="sel('Mafia','gMa')" id="gMa">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
        <div class="g-name">Mafia</div>
        <div class="g-min">4+ players</div>
      </button>
    </div>

    <div class="lobby-actions">
      <div class="p-count-box">
        <div class="p-count-num" id="p-count">0</div>
        <div class="p-count-lbl">Players<br>Joined</div>
      </div>
      <button class="start-btn" id="start-btn" disabled onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div class="game-bar">
    <div class="game-bar-left" id="game-label">Game</div>
    <div class="scorebar" id="scorebar"></div>
    <button class="skip-btn" onclick="socket.emit('next_phase')">Skip</button>
  </div>
  <div class="bg-grid"></div>
  <div class="tv" id="tv">
    <div class="pulse"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="ticker" id="ticker" style="display:none">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<audio id="aud-theme" src="/audio/main-theme.mp3" loop></audio>

<div class="reaction-overlay" id="reaction-overlay"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myCode=null, players={}, selectedGame='MindMeld';
let tvCanvas, tvCtx, musicStarted=false;

document.addEventListener('click',()=>{
  if(!musicStarted){
    const a=document.getElementById('aud-theme');
    a.volume=0.35; a.play().catch(()=>{});
    musicStarted=true;
  }
},{once:true});

socket.emit('create_room');

socket.on('room_created',({code})=>{
  myCode=code;
  document.getElementById('room-code').textContent=code;
  fetchQR(code);
  startTicker();
});

socket.on('room_update',({players:ps,phase})=>{
  players={};
  ps.forEach(p=>players[p.id]=p);
  renderPlayers(ps);
  updateScorebar(ps);
  document.getElementById('p-count').textContent=ps.length;
  const mins={MindMeld:2,HotTake:2,Voltage:2,Mole:4,Psychic:3,Copycat:3,Quiplash:2,Fibbage:2,Drawful:2,TriviaKnockout:2,PollMine:2,Mafia:4};
  document.getElementById('start-btn').disabled=ps.length<(mins[selectedGame]||2);
  if(phase==='lobby'){show('lobby');fadeInMusic();}
});

function fetchQR(code){
  fetch('/qr/'+code).then(r=>r.json()).then(d=>{
    const img=document.getElementById('qr-img');
    img.src=d.qr; img.style.display='block';
    document.getElementById('qr-big').src=d.qr;
  });
}
function openQR(){document.getElementById('qr-overlay').classList.add('open');}
function closeQR(){document.getElementById('qr-overlay').classList.remove('open');}

function renderPlayers(ps){
  const wall=document.getElementById('player-wall');
  if(!ps.length){wall.innerHTML='<div class="waiting-msg">Waiting for players...</div>';return;}
  wall.innerHTML=ps.map(p=>`<div class="p-card"><div class="p-av" id="pav-${p.id}"></div><div class="p-name">${p.nickname}</div><div class="p-score">${p.score}pts</div></div>`).join('');
  ps.forEach(p=>renderAv(p.avatar,document.getElementById('pav-'+p.id)));
}
function renderAv(av,el){
  if(!el||!av)return;
  if(av.startsWith('data:')){
    el.innerHTML=`<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else if(av.startsWith('av:')){
    const svgPart=av.split('|').slice(1).join('|');
    el.innerHTML=svgPart;
    el.style.borderRadius='50%';el.style.overflow='hidden';
  } else {
    el.textContent=av;
  }
}
function updateScorebar(ps){
  const sorted=[...ps].sort((a,b)=>b.score-a.score);
  document.getElementById('scorebar').innerHTML=sorted.map(p=>`<div class="s-chip"><div class="s-chip-av" id="sbav-${p.id}"></div>${p.nickname}<span class="s-pts">${p.score}</span></div>`).join('');
  sorted.forEach(p=>renderAv(p.avatar,document.getElementById('sbav-'+p.id)));
}
function sel(name,btnId){
  selectedGame=name;
  document.querySelectorAll('.g-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
  const mins={MindMeld:2,HotTake:2,Voltage:2,Mole:4,Psychic:3,Copycat:3,Quiplash:2,Fibbage:2,Drawful:2,TriviaKnockout:2,PollMine:2,Mafia:4};
  document.getElementById('start-btn').disabled=Object.keys(players).length<(mins[name]||2);
}
function startGame(){
  socket.emit('start_game',{gameName:selectedGame});
  const labels={MindMeld:'MIND MELD',HotTake:'HOT TAKE',Voltage:'VOLTAGE',Mole:'THE MOLE',Psychic:'PSYCHIC',Copycat:'COPYCAT',Quiplash:'QUIPLASH',Fibbage:'FIBBAGE',Drawful:'DRAWFUL',TriviaKnockout:'TRIVIA KNOCKOUT',PollMine:'POLL MINE',Mafia:'MAFIA'};
  document.getElementById('game-label').textContent=labels[selectedGame]||selectedGame;
  show('game');
  document.getElementById('ticker').style.display='none';
  fadeOutMusic();
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+id).classList.add('active');}
function setTV(html){document.getElementById('tv').innerHTML=html;}
function dots(c,t){return `<div class="dots">${Array(t).fill(0).map((_,i)=>`<div class="dot${i<c?' on':''}"></div>`).join('')}</div>`;}
function updateDots(c,t){const d=document.querySelector('#tv .dots');if(d)d.innerHTML=Array(t).fill(0).map((_,i)=>`<div class="dot${i<c?' on':''}"></div>`).join('');}
function fadeOutMusic(){const a=document.getElementById('aud-theme');let v=a.volume;const f=setInterval(()=>{v=Math.max(0,v-.05);a.volume=v;if(v<=0){clearInterval(f);a.pause();}},80);}
function fadeInMusic(){const a=document.getElementById('aud-theme');a.volume=0;a.play().catch(()=>{});let v=0;const f=setInterval(()=>{v=Math.min(.35,v+.04);a.volume=v;if(v>=.35)clearInterval(f);},80);}
function startTicker(){
  const msgs=['JOIN AT COUCHPACK.ONE/JOIN','NO APP NEEDED','SCAN THE QR CODE','COUCH PACK','THE PARTY GAME','GRAB YOUR PHONE'];
  const doubled=[...msgs,...msgs];
  document.getElementById('ticker-inner').innerHTML=doubled.map(m=>`<span>${m} &nbsp;—&nbsp;</span>`).join('');
  document.getElementById('ticker').style.display='block';
}

socket.on('player_answered',({count,total,playerId})=>{
  updateDots(count,total);
  // Show exciting "X/Y answered" counter
  const statusEl=document.querySelector('#tv .tv-sub');
  if(statusEl)statusEl.textContent=`${count} / ${total} answered`;
  if(count>=total){
    const sub=document.querySelector('#tv .tv-sub');
    if(sub){sub.textContent='Everyone answered!';sub.style.color='var(--g)';}
  }
});
socket.on('vote_received',({count,total})=>{
  updateDots(count,total);
  if(count>=total){
    const lbl=document.querySelector('#tv .tv-label');
    if(lbl){lbl.textContent='All votes in!';lbl.style.color='var(--g)';}
  }
});
socket.on('guess_count',({count,total})=>updateDots(count,total));
socket.on('vote_count',({count,total})=>updateDots(count,total));

// ── MIND MELD ──
socket.on('mindmeld_round',({round,totalRounds,question})=>{
  show('game');
  const t=Object.keys(players).length;
  setTV(`<div class="tv-label">MIND MELD — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${question}</div>
    <div class="tv-sub">Type the first thing that comes to mind. Match others to score!</div>
    ${dots(0,t)}`);
});
socket.on('mindmeld_results',({question,answers,meldPairs,players:ps})=>{
  const tally={};
  answers.forEach(a=>{tally[a.answer]=(tally[a.answer]||0)+1;});
  const sorted=[...answers].sort((a,b)=>tally[b.answer]-tally[a.answer]);
  setTV(`<div class="tv-label">RESULTS</div>
    <div class="tv-heading">${question}</div>
    <div class="meld-grid">
      ${sorted.map(a=>{
        const count=tally[a.answer];
        const isMeld=count>1;
        return `<div class="meld-card${isMeld?' meld':''}">
          <div class="meld-answer">${a.answer}</div>
          <div class="meld-who">${a.nickname}</div>
          <div class="meld-count">${count>1?`x${count} match!`:''}</div>
        </div>`;
      }).join('')}
    </div>
    ${meldPairs.length?`<div class="tv-sub">Mind Melded: ${meldPairs.map(m=>m.names.join(' & ')).join(' | ')}</div>`:''}`);
  updateScorebar(Object.values(ps));
});

// ── HOT TAKE ──
socket.on('hottake_round',({round,totalRounds,statement})=>{
  show('game');
  const t=Object.keys(players).length;
  setTV(`<div class="tv-label">HOT TAKE — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${statement}</div>
    <div class="tv-sub">Hot Take or Normal Take? Vote on your phone!</div>
    ${dots(0,t)}`);
});
socket.on('hottake_reveal',({statement,hotCount,normalCount,majority,players:ps})=>{
  const total=hotCount+normalCount;
  setTV(`<div class="tv-label">RESULTS</div>
    <div class="tv-heading">${statement}</div>
    <div class="hot-take-display">
      <div class="ht-side hot${majority==='hot'?' win':''}">
        <div class="ht-label" style="color:var(--r)">Hot Take</div>
        <div class="ht-count">${hotCount}</div>
        <div class="tv-sub">${Math.round(hotCount/total*100)}%</div>
      </div>
      <div class="ht-side norm${majority==='normal'?' win':''}">
        <div class="ht-label" style="color:var(--g)">Normal Take</div>
        <div class="ht-count">${normalCount}</div>
        <div class="tv-sub">${Math.round(normalCount/total*100)}%</div>
      </div>
    </div>
    ${majority==='tie'?'<div class="tv-sub" style="color:var(--y)">Perfect split! Everyone gets chaos points!</div>':''}`);
  updateScorebar(Object.values(ps));
});

// ── VOLTAGE ──
socket.on('voltage_round',({round,totalRounds,category,timeLimit})=>{
  show('game');
  const t=Object.keys(players).length;
  setTV(`<div class="tv-label">VOLTAGE — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${category}</div>
    <div class="tv-sub">Unique answers score big. Shared answers score less. You have ${timeLimit}s!</div>
    ${dots(0,t)}`);
});
socket.on('voltage_results',({category,results,players:ps})=>{
  const sorted=[...results].sort((a,b)=>b.points-a.points);
  setTV(`<div class="tv-label">RESULTS — ${category}</div>
    <div class="volt-grid">
      ${sorted.map(r=>`<div class="volt-card">
        <div class="volt-answer">${r.answer||'—'}</div>
        <div class="volt-who">${r.nickname}</div>
        <div class="volt-pts ${r.points>=300?'unique':r.points>0?'shared':'none'}">${r.reason}</div>
      </div>`).join('')}
    </div>`);
  updateScorebar(Object.values(ps));
});

// ── THE MOLE ──
socket.on('mole_start',({discussionTime})=>{
  show('game');
  let t=discussionTime;
  setTV(`<div class="tv-label">THE MOLE</div>
    <div class="tv-heading">Get someone to say your word!</div>
    <div class="tv-sub">One player is secretly The Mole. Everyone check your phones for your secret mission.</div>
    <div class="discussion-timer" id="mole-timer">${t}</div>`);
  const interval=setInterval(()=>{
    t--;
    const el=document.getElementById('mole-timer');
    if(el)el.textContent=t;
    if(t<=0)clearInterval(interval);
  },1000);
});
socket.on('mole_mission_claimed',({nickname,victim})=>{
  const sub=document.querySelector('#tv .tv-sub');
  if(sub)sub.textContent=`${nickname} claims they got ${victim} to say their word!`;
});
socket.on('mole_catch_announced',({moleName,caughtName,caught})=>{
  const sub=document.querySelector('#tv .tv-sub');
  if(sub)sub.textContent=caught?`${moleName} caught ${caughtName}!`:`${moleName} tried to catch ${caughtName} — WRONG!`;
});
socket.on('mole_voting_start',({players:ps})=>{
  const t=ps.length;
  setTV(`<div class="tv-label">VOTE TIME</div>
    <div class="tv-heading">Who is The Mole?</div>
    <div class="tv-sub">Vote on your phone!</div>
    ${dots(0,t)}`);
});
socket.on('mole_reveal',({moleId,moleName,assignments,players:ps})=>{
  setTV(`<div class="tv-label">THE MOLE WAS...</div>
    <div class="tv-heading" style="color:var(--r)">${moleName}!</div>
    <div class="meld-grid">
      ${assignments.map(a=>`<div class="meld-card${a.isMole?' meld':''}">
        <div class="meld-answer">${a.isMole?'THE MOLE':a.word||'?'}</div>
        <div class="meld-who">${a.nickname}</div>
        <div class="meld-count">${a.completed?'✓ Completed':a.isMole?'':'✗ Failed'}</div>
      </div>`).join('')}
    </div>`);
  updateScorebar(Object.values(ps));
});

// ── PSYCHIC ──
socket.on('psychic_round',({round,totalRounds,psychicName,psychicAvatar,category,maxQuestions})=>{
  show('game');
  setTV(`<div class="tv-label">PSYCHIC — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${psychicName} is the Psychic</div>
    <div class="tv-sub">Category: ${category} — Ask yes/no questions. They can only answer in nonsense!</div>
    <div class="q-chain" id="q-chain"></div>`);
});
socket.on('psychic_question_asked',({question,questioner})=>{
  const chain=document.getElementById('q-chain');
  if(chain){
    const row=document.createElement('div');
    row.className='q-row';
    row.id='qrow-'+Date.now();
    row.innerHTML=`<div class="q-text">${questioner}: ${question}</div><div class="q-ans" id="qans-${Date.now()}">...</div>`;
    chain.appendChild(row);
    chain.scrollTop=chain.scrollHeight;
  }
});
socket.on('psychic_answered',({answer,questions})=>{
  const chain=document.getElementById('q-chain');
  if(chain){
    chain.innerHTML=questions.map(q=>`<div class="q-row"><div class="q-text">${q.questioner}: ${q.question}</div><div class="q-ans">${q.answer||'...'}</div></div>`).join('');
    chain.scrollTop=chain.scrollHeight;
  }
});
socket.on('psychic_wrong_guess_tv',({guesserName,guess})=>{
  const sub=document.querySelector('#tv .tv-sub');
  if(sub)sub.textContent=`${guesserName} guessed "${guess}" — WRONG! -100 pts`;
});
socket.on('psychic_round_end',({word,winnerName,psychicName,questions,players:ps})=>{
  setTV(`<div class="tv-label">ROUND OVER</div>
    <div class="tv-heading" style="color:${winnerName?'var(--g)':'var(--r)'}">${winnerName?`${winnerName} got it!`:'Nobody guessed it!'}</div>
    <div class="tv-sub">The word was: <strong style="color:var(--y)">${word}</strong></div>
    <div class="q-chain">
      ${questions.map(q=>`<div class="q-row"><div class="q-text">${q.questioner}: ${q.question}</div><div class="q-ans">${q.answer||'?'}</div></div>`).join('')}
    </div>`);
  updateScorebar(Object.values(ps));
});

// ── COPYCAT ──
socket.on('copycat_drawing_phase',({drawerName,position,total,isFirst})=>{
  show('game');
  setTV(`<div class="tv-label">COPYCAT — ${position} OF ${total}</div>
    <div class="tv-heading">${drawerName} is drawing</div>
    <div class="tv-sub">${isFirst?'Drawing the original prompt!':'Copying the previous drawing!'}</div>
    <div class="pulse"><span></span><span></span><span></span></div>`);
});
socket.on('copycat_reveal',({originalPrompt,chain})=>{
  const chainHTML=chain.map(c=>`<div class="copycat-card">
    ${c.drawing?`<img src="${c.drawing}" alt="drawing"/>`:`<canvas style="background:#eee"></canvas>`}
    <div class="copycat-who">${c.nickname}</div>
  </div>`).join('');
  setTV(`<div class="tv-label">THE TELEPHONE DRAWING CHAIN</div>
    <div class="tv-heading">${originalPrompt}</div>
    <div class="copycat-chain">${chainHTML}</div>
    <div class="tv-sub">Vote for your favourite on your phone!</div>
    ${dots(0,Object.keys(players).length)}`);
});
socket.on('copycat_scores',({tally,players:ps})=>{
  updateScorebar(Object.values(ps));
});

// ── FINAL ──
// Track who's typing
const typingPlayers = {};
socket.on('player_typing', ({playerId, nickname, isTyping}) => {
  if (isTyping) {
    typingPlayers[playerId] = nickname;
  } else {
    delete typingPlayers[playerId];
  }
  updateTypingBar();
});

function updateTypingBar() {
  const bar = document.getElementById('typing-bar');
  if (!bar) return;
  const names = Object.values(typingPlayers);
  bar.innerHTML = names.map(n => `
    <div class="typing-chip">
      ${n} <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  `).join('');
}

// Reactions
socket.on('player_reaction', ({playerId, nickname, avatar, emoji}) => {
  const overlay = document.getElementById('reaction-overlay');
  if (!overlay) return;
  const bubble = document.createElement('div');
  bubble.className = 'reaction-bubble';
  // random horizontal position
  const xPos = 10 + Math.random() * 80;
  bubble.style.left = xPos + '%';
  bubble.innerHTML = `<span>${emoji}</span><div class="reaction-name">${nickname}</div>`;
  overlay.appendChild(bubble);
  setTimeout(() => bubble.remove(), 2600);
});

socket.on('final_scores',({scores,gameName})=>{
  const medals=['1ST','2ND','3RD'];
  setTimeout(()=>{
    setTV(`<div class="tv-label">GAME OVER — ${gameName.toUpperCase()}</div>
      <div class="tv-heading">Final Scores</div>
      <div class="scores-list">
        ${scores.map((p,i)=>`<div class="sr" style="animation-delay:${i*.12}s">
          <div class="sr-rank ${i===0?'g':i===1?'s':i===2?'b':''}">${medals[i]||(i+1)}</div>
          <div class="sr-av" id="fsav-${p.id}"></div>
          <div class="sr-name">${p.nickname}</div>
          <div class="sr-pts">${p.score}</div>
        </div>`).join('')}
      </div>`);
    scores.forEach(p=>renderAv(p.avatar,document.getElementById('fsav-'+p.id)));
  },600);
});
socket.on('game_over',()=>{
  setTimeout(()=>{
    const tv=document.getElementById('tv');
    if(tv)tv.insertAdjacentHTML('beforeend',`<button onclick="socket.emit('return_to_lobby')" style="background:var(--y);border:none;border-radius:12px;padding:14px 36px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:#000;cursor:pointer;margin-top:8px">Back to Lobby</button>`);
  },4000);
});
socket.on('game_ended',({returnToLobby})=>{
  if(returnToLobby){show('lobby');document.getElementById('ticker').style.display='block';fadeInMusic();}
});
socket.on('host_disconnected',()=>{
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Bebas Neue,cursive;font-size:40px;color:#ff2d2d;text-align:center;padding:20px">Host Disconnected</div>';
});
socket.on('start_error',({message})=>{
  const btn=document.getElementById('start-btn');
  if(btn){btn.textContent=message;setTimeout(()=>btn.textContent='Start Game',3000);}
});
</script>
</body>
</html>
