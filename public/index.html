<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Pack — Host</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');

  :root {
    --purple: #6c3fc5;
    --pink: #e8357a;
    --yellow: #ffd93d;
    --teal: #00c9a7;
    --orange: #ff6b35;
    --dark: #1a1a2e;
    --card: #16213e;
    --text: #eaf4fb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* ===== LOBBY ===== */
  #lobby {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 32px;
  }

  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: 72px;
    background: linear-gradient(135deg, var(--yellow), var(--pink), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    line-height: 1;
  }

  .subtitle { font-size: 20px; color: #aaa; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

  .lobby-grid {
    display: grid; grid-template-columns: 1fr 2fr; gap: 40px; width: 90%; max-width: 1000px;
  }

  .join-panel {
    background: var(--card); border-radius: 24px; padding: 32px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  .room-code {
    font-family: 'Fredoka One', cursive;
    font-size: 64px;
    color: var(--yellow);
    letter-spacing: 8px;
    text-align: center;
  }

  .code-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #888; }

  #qr-img { width: 140px; height: 140px; border-radius: 12px; background: white; }

  .join-url { font-size: 13px; color: #888; text-align: center; word-break: break-all; }

  .players-panel { background: var(--card); border-radius: 24px; padding: 32px; }

  .players-panel h3 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 16px; }

  .player-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

  .player-chip {
    background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 0.3s ease;
    animation: popIn 0.3s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .player-avatar { font-size: 36px; }
  .player-name { font-size: 13px; font-weight: 800; text-align: center; }

  .game-select { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }

  .game-btn {
    background: linear-gradient(135deg, var(--purple), #9b59b6);
    border: none; color: white; padding: 14px 20px; border-radius: 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    flex: 1; min-width: 120px;
  }

  .game-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108,63,197,0.5); }
  .game-btn.active { background: linear-gradient(135deg, var(--pink), var(--orange)); }
  .game-emoji { font-size: 28px; }

  .start-btn {
    background: linear-gradient(135deg, var(--teal), #00a8cc);
    border: none; color: white; padding: 18px 48px; border-radius: 100px;
    font-family: 'Fredoka One', cursive; font-size: 28px;
    cursor: pointer; transition: all 0.2s; width: 100%;
    margin-top: 8px;
  }

  .start-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(0,201,167,0.4); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== GAME SCREEN ===== */
  #game-screen { display: none; flex-direction: column; height: 100vh; }

  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    background: rgba(0,0,0,0.3);
  }

  .game-name { font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--yellow); }

  .scoreboard {
    display: flex; gap: 12px; overflow-x: auto;
  }

  .score-chip {
    background: rgba(255,255,255,0.1); border-radius: 100px;
    padding: 8px 16px; display: flex; align-items: center; gap: 8px;
    font-weight: 800; font-size: 14px; white-space: nowrap;
  }

  .score-chip .pts { color: var(--yellow); font-size: 12px; }

  .skip-btn {
    background: rgba(255,255,255,0.1); border: none; color: #aaa;
    padding: 8px 16px; border-radius: 100px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 13px;
    transition: all 0.2s;
  }
  .skip-btn:hover { background: rgba(255,255,255,0.2); color: white; }

  .game-content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 32px; gap: 32px;
    overflow: hidden;
  }

  /* ===== SHARED COMPONENTS ===== */
  .big-prompt {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(24px, 4vw, 48px);
    text-align: center;
    color: var(--yellow);
    max-width: 900px;
    line-height: 1.2;
  }

  .phase-label {
    font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--teal); font-weight: 800;
  }

  .answers-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; width: 100%; max-width: 900px;
  }

  .answer-card {
    background: var(--card); border-radius: 20px; padding: 24px;
    display: flex; flex-direction: column; gap: 8px;
    border: 2px solid transparent; transition: all 0.3s;
    position: relative; overflow: hidden;
  }

  .answer-card.reveal-correct { border-color: var(--teal); background: rgba(0,201,167,0.1); }
  .answer-card.reveal-wrong { border-color: var(--pink); opacity: 0.6; }

  .answer-author { font-size: 13px; color: #888; font-weight: 700; }
  .answer-text { font-size: clamp(16px, 2.5vw, 22px); font-weight: 800; }

  .vote-bar {
    height: 6px; background: rgba(255,255,255,0.1); border-radius: 100px;
    overflow: hidden; margin-top: 4px;
  }

  .vote-fill { height: 100%; background: var(--yellow); border-radius: 100px; transition: width 1s ease; }

  .vote-count { font-size: 20px; font-weight: 900; color: var(--yellow); }

  /* Timer */
  .timer-ring { position: relative; width: 80px; height: 80px; }
  .timer-text {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--yellow);
  }

  /* Players answered indicator */
  .answered-indicator {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .answered-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
  }
  .answered-dot.done { background: var(--teal); }

  /* Results */
  .results-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 700px; }

  .result-row {
    background: var(--card); border-radius: 16px; padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { transform: translateX(-30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .result-rank { font-family: 'Fredoka One', cursive; font-size: 32px; color: #444; width: 48px; }
  .result-rank.gold { color: var(--yellow); }
  .result-rank.silver { color: #aaa; }
  .result-rank.bronze { color: #cd7f32; }
  .result-avatar { font-size: 36px; }
  .result-name { font-weight: 800; font-size: 18px; flex: 1; }
  .result-score { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--yellow); }

  /* Drawing canvas TV view */
  #tv-canvas { border-radius: 20px; background: white; max-width: 500px; max-height: 400px; }

  /* Options list (trivia, fibbage) */
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%; max-width: 900px;
  }

  .option-card {
    background: var(--card); border-radius: 16px; padding: 20px 24px;
    font-size: clamp(14px, 2vw, 18px); font-weight: 800;
    border: 2px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
    display: flex; align-items: center; gap: 12px;
  }

  .option-letter {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--purple); display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; font-size: 16px; flex-shrink: 0;
  }

  .option-card.correct { border-color: var(--teal); background: rgba(0,201,167,0.1); }
  .option-card.wrong { border-color: var(--pink); opacity: 0.5; }

  /* Poll bars */
  .poll-bar-list { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 700px; }
  .poll-bar-row { display: flex; flex-direction: column; gap: 4px; }
  .poll-bar-label { font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; }
  .poll-bar-track { height: 20px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
  .poll-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 100px; transition: width 1s ease; }

  /* Status messages */
  .status-msg { color: #888; font-size: 16px; font-weight: 700; }

  /* Waiting state */
  .waiting-anim {
    display: flex; gap: 8px; justify-content: center; align-items: center;
  }
  .waiting-dot {
    width: 12px; height: 12px; border-radius: 50%; background: var(--purple);
    animation: bounce 1s infinite;
  }
  .waiting-dot:nth-child(2) { animation-delay: 0.2s; background: var(--pink); }
  .waiting-dot:nth-child(3) { animation-delay: 0.4s; background: var(--yellow); }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .hidden { display: none !important; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-center { justify-content: center; }
  .gap-4 { gap: 16px; }
  .text-center { text-align: center; }
  .mt-4 { margin-top: 16px; }

  /* Eliminated player badge */
  .elim-badge {
    background: rgba(232,53,122,0.2); border: 1px solid var(--pink);
    border-radius: 100px; padding: 4px 12px; font-size: 12px; color: var(--pink);
    font-weight: 800;
  }
</style>
</head>
<body>
<div id="app">

  <!-- LOBBY -->
  <div id="lobby">
    <div class="game-title">🎉 Party Pack</div>
    <div class="subtitle">The Ultimate Party Game Collection</div>

    <div class="lobby-grid">
      <div class="join-panel">
        <div class="code-label">Room Code</div>
        <div class="room-code" id="room-code">----</div>
        <img id="qr-img" src="" alt="QR Code" style="display:none"/>
        <div class="join-url" id="join-url"></div>
        <div class="code-label" style="margin-top:8px">scan to join on phone</div>
      </div>

      <div class="players-panel">
        <h3>Players (<span id="player-count">0</span>/8)</h3>
        <div class="player-grid" id="player-grid"></div>

        <div style="margin-top: 24px;">
          <div class="code-label" style="margin-bottom: 12px;">Choose a Game</div>
          <div class="game-select">
            <button class="game-btn active" onclick="selectGame('Quiplash')" id="btn-Quiplash">
              <span class="game-emoji">😂</span>Quiplash
            </button>
            <button class="game-btn" onclick="selectGame('Fibbage')" id="btn-Fibbage">
              <span class="game-emoji">🤥</span>Fibbage
            </button>
            <button class="game-btn" onclick="selectGame('Drawful')" id="btn-Drawful">
              <span class="game-emoji">🎨</span>Drawful
            </button>
            <button class="game-btn" onclick="selectGame('TriviaKnockout')" id="btn-TriviaKnockout">
              <span class="game-emoji">🧠</span>Trivia
            </button>
            <button class="game-btn" onclick="selectGame('PollMine')" id="btn-PollMine">
              <span class="game-emoji">📊</span>Poll Mine
            </button>
          </div>
        </div>

        <button class="start-btn" id="start-btn" disabled onclick="startGame()">
          Start Game!
        </button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-name" id="game-name">Game</div>
      <div class="scoreboard" id="scoreboard"></div>
      <button class="skip-btn" onclick="skipPhase()">⏭ Skip</button>
    </div>
    <div class="game-content" id="game-content">
      <div class="waiting-anim">
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
      </div>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myCode = null;
let myPlayer = null;
let selectedGame = 'Quiplash';
let players = {};
let canvasCtx = null;

// ─── HOST SETUP ───────────────────────────────────────────
const nickname = 'Host';
socket.emit('create_room', { nickname });

socket.on('room_created', ({ code, player }) => {
  myCode = code;
  myPlayer = player;
  document.getElementById('room-code').textContent = code;
  fetchQR(code);
});

socket.on('room_update', ({ players: ps, phase, game }) => {
  players = {};
  ps.forEach(p => players[p.id] = p);
  renderLobbyPlayers(ps);
  updateScoreboard(ps);

  if (phase === 'lobby') {
    showLobby();
  }
  document.getElementById('start-btn').disabled = ps.length < 2;
});

socket.on('player_left', ({ id }) => {});

function fetchQR(code) {
  fetch(`/qr/${code}`)
    .then(r => r.json())
    .then(data => {
      const img = document.getElementById('qr-img');
      img.src = data.qr;
      img.style.display = 'block';
      document.getElementById('join-url').textContent = data.url;
    });
}

function renderLobbyPlayers(ps) {
  document.getElementById('player-count').textContent = ps.length;
  document.getElementById('player-grid').innerHTML = ps.map(p => `
    <div class="player-chip">
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${p.nickname}</div>
    </div>
  `).join('');
}

function updateScoreboard(ps) {
  const sorted = [...ps].sort((a,b) => b.score - a.score);
  document.getElementById('scoreboard').innerHTML = sorted.map(p => `
    <div class="score-chip">
      ${p.avatar} ${p.nickname}
      <span class="pts">${p.score}pts</span>
    </div>
  `).join('');
}

function selectGame(name) {
  selectedGame = name;
  document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
}

function startGame() {
  socket.emit('start_game', { gameName: selectedGame });
  document.getElementById('game-name').textContent = {
    Quiplash: '😂 Quiplash',
    Fibbage: '🤥 Fibbage',
    Drawful: '🎨 Drawful',
    TriviaKnockout: '🧠 Trivia Knockout',
    PollMine: '📊 Poll Mine'
  }[selectedGame] || selectedGame;
  showGameScreen();
}

function skipPhase() { socket.emit('next_phase'); }

function showLobby() {
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('game-screen').style.display = 'none';
}

function showGameScreen() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
}

// ─── GAME EVENTS ──────────────────────────────────────────

function setContent(html) {
  document.getElementById('game-content').innerHTML = html;
}

function answeredDots(count, total) {
  return `<div class="answered-indicator">${Array(total).fill(0).map((_,i) =>
    `<div class="answered-dot ${i < count ? 'done' : ''}"></div>`
  ).join('')}</div>`;
}

// Shared
socket.on('player_answered', ({ count }) => {
  const dots = document.querySelector('.answered-indicator');
  if (dots) {
    const all = dots.querySelectorAll('.answered-dot');
    all.forEach((d, i) => { if (i < count) d.classList.add('done'); });
  }
});

socket.on('vote_received', ({ count }) => {
  const dots = document.querySelector('.answered-indicator');
  if (dots) {
    const all = dots.querySelectorAll('.answered-dot');
    all.forEach((d, i) => { if (i < count) d.classList.add('done'); });
  }
});

// ─── QUIPLASH ───────────────────────────────────────────
socket.on('quiplash_round', ({ round, totalRounds, phase }) => {
  const total = Object.keys(players).length;
  setContent(`
    <div class="phase-label">Round ${round} of ${totalRounds} · Quiplash</div>
    <div class="big-prompt">Players are writing their funniest answers...</div>
    <div class="status-msg">Waiting for everyone to answer</div>
    ${answeredDots(0, total)}
    <div class="waiting-anim">
      <div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div>
    </div>
  `);
});

socket.on('quiplash_vote', ({ prompt, options }) => {
  const total = Object.keys(players).length;
  const eligible = total - 2;
  setContent(`
    <div class="phase-label">Vote!</div>
    <div class="big-prompt">${prompt}</div>
    <div class="answers-grid">
      ${options.map(o => `
        <div class="answer-card" id="ans-${o.playerId}">
          <div class="answer-author">${o.avatar} ${o.nickname}</div>
          <div class="answer-text">${o.answer}</div>
          <div class="vote-bar"><div class="vote-fill" style="width:0%" id="bar-${o.playerId}"></div></div>
        </div>
      `).join('')}
    </div>
    ${eligible > 0 ? answeredDots(0, eligible) : ''}
  `);
});

socket.on('vote_results', ({ tally, players: ps }) => {
  const total = Object.values(tally).reduce((a, b) => a + b, 0);
  Object.entries(tally).forEach(([pid, count]) => {
    const bar = document.getElementById('bar-' + pid);
    if (bar && total > 0) bar.style.width = (count / total * 100) + '%';
    const card = document.getElementById('ans-' + pid);
    if (card) {
      card.querySelector('.vote-bar').insertAdjacentHTML('afterend',
        `<div class="vote-count">${count} vote${count !== 1 ? 's' : ''}</div>`);
    }
  });
  updateScoreboard(Object.values(ps));
});

// ─── FIBBAGE ───────────────────────────────────────────
socket.on('fibbage_round', ({ round, totalRounds, category, prompt }) => {
  const total = Object.keys(players).length;
  setContent(`
    <div class="phase-label">Round ${round} of ${totalRounds} · ${category}</div>
    <div class="big-prompt">${prompt}</div>
    <div class="status-msg">Players are writing their sneaky lies...</div>
    ${answeredDots(0, total)}
  `);
});

socket.on('fibbage_vote', ({ answers }) => {
  const letters = ['A','B','C','D','E'];
  const total = Object.keys(players).length;
  setContent(`
    <div class="phase-label">Which is the TRUTH?</div>
    <div class="options-grid">
      ${answers.map((a, i) => `
        <div class="option-card" id="fibopt-${a.id}">
          <div class="option-letter">${letters[i]}</div>
          ${a.text}
        </div>
      `).join('')}
    </div>
    ${answeredDots(0, total)}
  `);
});

socket.on('fibbage_results', ({ truth, answers, votes, players: ps }) => {
  answers.forEach(a => {
    const el = document.getElementById('fibopt-' + a.id);
    if (!el) return;
    if (!a.isLie) el.classList.add('correct');
    else el.classList.add('wrong');
  });
  setTimeout(() => updateScoreboard(Object.values(ps)), 500);
});

// ─── DRAWFUL ───────────────────────────────────────────
let tvCanvas, tvCtx;

socket.on('drawful_drawing', ({ drawerName, drawerAvatar, round, totalRounds }) => {
  setContent(`
    <div class="phase-label">Round ${round} of ${totalRounds} · Drawing</div>
    <div class="big-prompt">${drawerAvatar} ${drawerName} is drawing...</div>
    <canvas id="tv-canvas" width="500" height="380"></canvas>
    <div class="status-msg">Watch carefully!</div>
  `);
  tvCanvas = document.getElementById('tv-canvas');
  tvCtx = tvCanvas.getContext('2d');
  tvCtx.fillStyle = 'white';
  tvCtx.fillRect(0, 0, 500, 380);
});

socket.on('new_stroke', ({ stroke }) => {
  if (!tvCtx || !stroke || stroke.length < 2) return;
  tvCtx.beginPath();
  tvCtx.strokeStyle = stroke[0].color || '#000';
  tvCtx.lineWidth = stroke[0].size || 4;
  tvCtx.lineCap = 'round';
  tvCtx.lineJoin = 'round';
  tvCtx.moveTo(stroke[0].x * 500, stroke[0].y * 380);
  stroke.forEach(pt => tvCtx.lineTo(pt.x * 500, pt.y * 380));
  tvCtx.stroke();
});

socket.on('drawful_guess_phase', () => {
  const existing = document.querySelector('.big-prompt');
  if (existing) existing.textContent = 'What is this??';
  const total = Object.keys(players).length - 1;
  const statusEl = document.querySelector('.status-msg');
  if (statusEl) statusEl.textContent = 'Players are guessing...';
  const content = document.getElementById('game-content');
  const dots = document.createElement('div');
  dots.innerHTML = answeredDots(0, total);
  content.appendChild(dots.firstChild);
});

socket.on('drawful_vote', ({ answers }) => {
  const letters = ['A','B','C','D','E','F'];
  const total = Object.keys(players).length - 1;
  const canvas = document.getElementById('tv-canvas');
  const canvasClone = canvas ? canvas.outerHTML : '';
  setContent(`
    <div class="phase-label">Vote for the real answer!</div>
    ${canvasClone}
    <div class="options-grid">
      ${answers.map((a,i) => `
        <div class="option-card" id="drawopt-${a.id}">
          <div class="option-letter">${letters[i]}</div>
          ${a.text}
        </div>
      `).join('')}
    </div>
    ${answeredDots(0, total)}
  `);
});

socket.on('drawful_results', ({ correctAnswer, answers, players: ps }) => {
  answers.forEach(a => {
    const el = document.getElementById('drawopt-' + a.id);
    if (!el) return;
    if (a.isCorrect) el.classList.add('correct');
    else el.classList.add('wrong');
  });
  const label = document.querySelector('.phase-label');
  if (label) label.textContent = `The answer was: "${correctAnswer}"`;
  setTimeout(() => updateScoreboard(Object.values(ps)), 500);
});

// ─── TRIVIA ───────────────────────────────────────────
socket.on('trivia_start', () => {
  setContent(`
    <div class="big-prompt">🧠 Trivia Knockout</div>
    <div class="status-msg">Get ready! Wrong answers get eliminated...</div>
    <div class="waiting-anim">
      <div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div>
    </div>
  `);
});

socket.on('trivia_question', ({ question, options, questionNum, activePlayers, eliminatedPlayers }) => {
  const letters = ['A','B','C','D'];
  const total = activePlayers.length;
  setContent(`
    <div class="phase-label">Question ${questionNum} · ${total} active players</div>
    <div class="big-prompt">${question}</div>
    <div class="options-grid">
      ${options.map((o,i) => `
        <div class="option-card" id="trivopt-${i}">
          <div class="option-letter">${letters[i]}</div>
          ${o}
        </div>
      `).join('')}
    </div>
    ${answeredDots(0, total)}
  `);
});

socket.on('trivia_reveal', ({ correctAnswer, results, eliminated, players: ps }) => {
  const options = document.querySelectorAll('.option-card');
  options.forEach(el => {
    const text = el.textContent.trim().replace(/^[A-D]\s*/, '');
    if (text === correctAnswer) el.classList.add('correct');
    else el.classList.add('wrong');
  });

  if (eliminated.length > 0) {
    const label = document.querySelector('.phase-label');
    if (label) label.innerHTML += ` · <span style="color:var(--pink)">❌ ${eliminated.length} eliminated!</span>`;
  }

  setTimeout(() => updateScoreboard(Object.values(ps)), 500);
});

// ─── POLL MINE ───────────────────────────────────────────
socket.on('pollmine_round', ({ round, totalRounds, question, options }) => {
  const total = Object.keys(players).length;
  setContent(`
    <div class="phase-label">Round ${round} of ${totalRounds} · Poll Mine</div>
    <div class="big-prompt">${question}</div>
    <div class="status-msg">Everyone is voting...</div>
    ${answeredDots(0, total)}
  `);
});

socket.on('pollmine_predict', ({ question }) => {
  const total = Object.keys(players).length;
  setContent(`
    <div class="phase-label">Now predict the ranking!</div>
    <div class="big-prompt">${question}</div>
    <div class="status-msg">Players are ranking what they think the group answered...</div>
    ${answeredDots(0, total)}
  `);
});

socket.on('pollmine_results', ({ question, tally, actualRanking, players: ps }) => {
  const total = Object.values(tally).reduce((a,b) => a+b, 0);
  setContent(`
    <div class="phase-label">Results!</div>
    <div class="big-prompt">${question}</div>
    <div class="poll-bar-list">
      ${actualRanking.map((option, rank) => {
        const count = tally[option] || 0;
        const pct = total > 0 ? (count / total * 100) : 0;
        const medals = ['🥇','🥈','🥉'];
        return `
          <div class="poll-bar-row">
            <div class="poll-bar-label">
              <span>${medals[rank] || ''} ${option}</span>
              <span>${count} vote${count !== 1 ? 's' : ''}</span>
            </div>
            <div class="poll-bar-track">
              <div class="poll-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `);
  setTimeout(() => updateScoreboard(Object.values(ps)), 1000);
});

// ─── FINAL RESULTS ───────────────────────────────────────
socket.on('round_scores', ({ scores, gameName }) => {
  setTimeout(() => {
    const medals = ['🥇','🥈','🥉'];
    setContent(`
      <div class="phase-label">Game Over · ${gameName}</div>
      <div class="big-prompt" style="color:var(--yellow)">Final Scores!</div>
      <div class="results-list">
        ${scores.map((p, i) => `
          <div class="result-row" style="animation-delay: ${i * 0.1}s">
            <div class="result-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i] || (i+1)}</div>
            <div class="result-avatar">${p.avatar}</div>
            <div class="result-name">${p.nickname}</div>
            <div class="result-score">${p.score}</div>
          </div>
        `).join('')}
      </div>
    `);
  }, 1000);
});

socket.on('game_ended', ({ returnToLobby }) => {
  if (returnToLobby) showLobby();
});

socket.on('game_over', ({ scores }) => {
  setTimeout(() => {
    const content = document.getElementById('game-content');
    content.insertAdjacentHTML('beforeend', `
      <button class="start-btn" style="max-width:300px; margin-top: 16px;"
        onclick="socket.emit('return_to_lobby')">Back to Lobby</button>
    `);
  }, 3000);
});
</script>
</body>
</html>
