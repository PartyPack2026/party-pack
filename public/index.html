<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Pack — Host</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--surface:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--red:#ff3b3b;--green:#00e87a;--blue:#3b8bff;--yellow:#ffe93b;--purple:#b43bff;--orange:#ff8c3b}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.screen.active{display:flex}
.big-title{font-family:'Bebas Neue',cursive;font-size:clamp(60px,10vw,120px);line-height:.9;letter-spacing:2px;text-align:center}
.big-title .y{color:var(--yellow)}.big-title .w{color:var(--text);font-size:.4em;letter-spacing:8px;display:block}
input{background:var(--surface);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;padding:14px 18px;width:100%;max-width:380px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--yellow)}
.btn{width:100%;max-width:380px;padding:16px 24px;border:none;border-radius:12px;font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:1px;cursor:pointer;transition:all .1s;color:#000;background:var(--yellow)}
.btn:hover{transform:scale(1.02)}.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:2px solid var(--border);color:var(--text);font-size:16px;font-family:'Space Grotesk',sans-serif;font-weight:700}
.label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center}

/* Lobby */
.lobby-wrap{display:grid;grid-template-columns:220px 1fr;gap:24px;width:100%;max-width:960px;align-items:start}
.join-box{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.room-code{font-family:'Bebas Neue',cursive;font-size:56px;color:var(--yellow);letter-spacing:8px;text-align:center}
#qr-img{width:120px;height:120px;border-radius:8px;background:white}
.join-url{font-size:11px;color:var(--muted);text-align:center;word-break:break-all;max-width:180px}
.right-box{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:20px}
.player-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;min-height:60px}
.p-chip{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;animation:pop .25s ease}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.p-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.p-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-name{font-size:11px;font-weight:700;text-align:center;color:var(--muted)}
.game-btns{display:flex;flex-wrap:wrap;gap:8px}
.g-btn{flex:1;min-width:100px;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.g-btn:hover{border-color:var(--yellow)}.g-btn.on{border-color:var(--yellow);background:rgba(255,233,59,.08);color:var(--yellow)}
.g-icon{font-size:20px}

/* Game screen */
.game-wrap{width:100%;min-height:100vh;display:flex;flex-direction:column}
.game-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10}
.game-label{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--yellow)}
.scorebar{display:flex;gap:8px;overflow-x:auto;flex:1;margin:0 12px}
.s-chip{background:var(--bg);border:2px solid var(--border);border-radius:100px;padding:6px 14px;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;white-space:nowrap}
.s-pts{color:var(--yellow);font-family:'Bebas Neue',cursive;font-size:16px}
.skip-btn{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.skip-btn:hover{border-color:var(--yellow);color:var(--yellow)}

/* TV content */
.tv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:24px}
.tv-heading{font-family:'Bebas Neue',cursive;font-size:clamp(24px,5vw,56px);text-align:center;color:var(--yellow);max-width:800px;line-height:1.1}
.tv-label{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.tv-canvas{border-radius:16px;background:white;width:100%;max-width:600px;height:420px;display:block}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:900px}
.ans-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px;transition:all .3s}
.ans-card.win{border-color:var(--green);background:rgba(0,232,122,.07)}
.ans-card.lose{opacity:.4}
.ans-author{font-size:12px;color:var(--muted);font-weight:700}
.ans-text{font-size:clamp(14px,2vw,20px);font-weight:700}
.vote-bar-wrap{height:4px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:4px}
.vote-bar-fill{height:100%;background:var(--yellow);border-radius:100px;transition:width 1s ease}
.vote-tally{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--yellow)}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:900px}
.opt-tv{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 18px;font-size:clamp(13px,1.8vw,17px);font-weight:700;display:flex;align-items:center;gap:10px;transition:all .3s}
.opt-tv.win{border-color:var(--green);background:rgba(0,232,122,.07)}
.opt-tv.lose{opacity:.35}
.opt-ltr{width:28px;height:28px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:16px;color:var(--yellow);flex-shrink:0}
.poll-bars{display:flex;flex-direction:column;gap:10px;width:100%;max-width:700px}
.poll-row{display:flex;flex-direction:column;gap:4px}
.poll-lbl{font-weight:700;font-size:14px;display:flex;justify-content:space-between}
.poll-track{height:16px;background:var(--border);border-radius:100px;overflow:hidden}
.poll-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:100px;transition:width 1s ease}
.dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
.dot.on{background:var(--green)}
.scores-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:700px}
.score-row{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;animation:slideIn .4s ease both}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
.s-rank{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--muted);width:44px;text-align:center}
.s-rank.g{color:var(--yellow)}.s-rank.s{color:#aaa}.s-rank.b{color:#cd7f32}
.s-av{font-size:28px;width:36px;text-align:center;overflow:hidden;border-radius:50%}
.s-av img{width:36px;height:36px;object-fit:cover;border-radius:50%}
.s-name{font-weight:700;font-size:16px;flex:1}
.s-score{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--yellow)}
.pulse{display:flex;gap:6px;justify-content:center}
.pulse span{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:p 1.2s ease-in-out infinite}
.pulse span:nth-child(2){animation-delay:.2s}.pulse span:nth-child(3){animation-delay:.4s}
@keyframes p{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.status{color:var(--muted);font-size:14px;font-weight:500;text-align:center}

/* Mafia TV */
.mafia-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;width:100%;max-width:800px}
.m-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;font-size:14px;text-align:center}
.m-card.dead{opacity:.3;border-style:dashed}
.m-av{font-size:32px;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.m-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dead-tag{font-size:11px;color:var(--red);font-weight:700;letter-spacing:1px;text-transform:uppercase}
</style>
</head>
<body>

<!-- LOBBY (host setup) -->
<div id="s-lobby" class="screen active">
  <div class="big-title">
    <span class="y">PARTY</span>
    <span class="y">PACK</span>
    <span class="w">HOST SCREEN</span>
  </div>

  <div id="name-setup" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
    <input id="host-name" placeholder="Your name (you're playing!)" maxlength="14" style="text-align:center"/>
    <button class="btn" onclick="createRoom()">Create Room →</button>
    <div style="color:var(--red);font-size:13px;font-weight:700" id="host-err"></div>
  </div>

  <div id="lobby-main" style="display:none;width:100%;max-width:960px">
    <div class="lobby-wrap">
      <div class="join-box">
        <div class="label">Room Code</div>
        <div class="room-code" id="room-code">----</div>
        <img id="qr-img" style="display:none" src="" alt="QR"/>
        <div class="join-url" id="join-url"></div>
        <div class="label">scan to join</div>
      </div>
      <div class="right-box">
        <div>
          <div class="label" style="margin-bottom:10px">Players (<span id="p-count">0</span>/10)</div>
          <div class="player-grid" id="player-grid"></div>
        </div>
        <div>
          <div class="label" style="margin-bottom:10px">Choose Game</div>
          <div class="game-btns">
            <button class="g-btn on" onclick="selGame('Quiplash','gq')" id="gq"><span class="g-icon">😂</span>Quiplash</button>
            <button class="g-btn" onclick="selGame('Fibbage','gf')" id="gf"><span class="g-icon">🤥</span>Fibbage</button>
            <button class="g-btn" onclick="selGame('Drawful','gd')" id="gd"><span class="g-icon">🎨</span>Drawful</button>
            <button class="g-btn" onclick="selGame('TriviaKnockout','gt')" id="gt"><span class="g-icon">🧠</span>Trivia</button>
            <button class="g-btn" onclick="selGame('PollMine','gp')" id="gp"><span class="g-icon">📊</span>Poll Mine</button>
            <button class="g-btn" onclick="selGame('Mafia','gm')" id="gm"><span class="g-icon">🔪</span>Mafia</button>
          </div>
        </div>
        <button class="btn" id="start-btn" disabled onclick="startGame()">Start Game!</button>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN (passive TV display) -->
<div id="s-game" class="screen" style="padding:0;justify-content:flex-start">
  <div class="game-wrap">
    <div class="game-bar">
      <div class="game-label" id="game-label">Game</div>
      <div class="scorebar" id="scorebar"></div>
      <button class="skip-btn" onclick="socket.emit('next_phase')">⏭ Skip</button>
    </div>
    <div class="tv" id="tv">
      <div class="pulse"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myId = null, myCode = null, players = {};
let selectedGame = 'Quiplash';
let tvCanvas, tvCtx;
let timers = {};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function setTV(html) { document.getElementById('tv').innerHTML = html; }

function renderAv(avatar, el) {
  if (!el) return;
  if (avatar && avatar.startsWith('data:')) {
    el.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else { el.textContent = avatar || '🎮'; }
}

function dots(count, total) {
  return `<div class="dots">${Array(total).fill(0).map((_,i) =>
    `<div class="dot${i<count?' on':''}"></div>`).join('')}</div>`;
}

function updateDots(count, total) {
  const d = document.querySelector('#tv .dots');
  if (d) d.innerHTML = Array(total).fill(0).map((_,i) =>
    `<div class="dot${i<count?' on':''}"></div>`).join('');
}

// ─── LOBBY ───
function createRoom() {
  const n = document.getElementById('host-name').value.trim();
  if (!n) { document.getElementById('host-err').textContent = 'Enter your name!'; return; }
  socket.emit('create_room', { nickname: n, avatar: '👑' });
}

socket.on('room_created', ({ code, player }) => {
  myId = socket.id; myCode = code;
  document.getElementById('name-setup').style.display = 'none';
  document.getElementById('lobby-main').style.display = 'block';
  document.getElementById('room-code').textContent = code;
  fetchQR(code);
});

socket.on('room_update', ({ players: ps, phase }) => {
  players = {};
  ps.forEach(p => players[p.id] = p);
  renderLobby(ps);
  updateScorebar(ps);
  if (phase === 'lobby') show('lobby');
  const min = selectedGame === 'Mafia' ? 4 : 2;
  document.getElementById('start-btn').disabled = ps.length < min;
});

function renderLobby(ps) {
  document.getElementById('p-count').textContent = ps.length;
  document.getElementById('player-grid').innerHTML = ps.map(p => `
    <div class="p-chip">
      <div class="p-av" id="pav-${p.id}"></div>
      <div class="p-name">${p.nickname.substring(0,8)}${p.isHost?'👑':''}</div>
    </div>
  `).join('');
  ps.forEach(p => renderAv(p.avatar, document.getElementById('pav-' + p.id)));
}

function updateScorebar(ps) {
  const sorted = [...ps].sort((a,b) => b.score-a.score);
  document.getElementById('scorebar').innerHTML = sorted.map(p => `
    <div class="s-chip">
      <div style="font-size:18px;width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center" id="sbav-${p.id}"></div>
      ${p.nickname}
      <span class="s-pts">${p.score}</span>
    </div>
  `).join('');
  sorted.forEach(p => renderAv(p.avatar, document.getElementById('sbav-' + p.id)));
}

function fetchQR(code) {
  fetch('/qr/' + code).then(r => r.json()).then(d => {
    const img = document.getElementById('qr-img');
    img.src = d.qr; img.style.display = 'block';
    document.getElementById('join-url').textContent = d.url;
  });
}

function selGame(name, btnId) {
  selectedGame = name;
  document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
  const min = name === 'Mafia' ? 4 : 2;
  document.getElementById('start-btn').disabled = Object.keys(players).length < min;
}

function startGame() {
  socket.emit('start_game', { gameName: selectedGame });
  document.getElementById('game-label').textContent = {
    Quiplash:'😂 QUIPLASH', Fibbage:'🤥 FIBBAGE', Drawful:'🎨 DRAWFUL',
    TriviaKnockout:'🧠 TRIVIA KNOCKOUT', PollMine:'📊 POLL MINE', Mafia:'🔪 MAFIA'
  }[selectedGame] || selectedGame;
  show('game');
}

// shared answer count
socket.on('guess_count', ({count,total}) => updateDots(count,total));
socket.on('vote_count', ({count,total}) => updateDots(count,total));
socket.on('player_answered', ({count,total}) => updateDots(count,total));
socket.on('vote_received', ({count,total}) => updateDots(count,total));

// ─── QUIPLASH TV ───
socket.on('quiplash_round', ({round,totalRounds}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">QUIPLASH — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">Everyone's writing their funniest answer...</div>
    ${dots(0,total)}
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('quiplash_vote', ({prompt, options}) => {
  const total = Object.keys(players).length - 2;
  setTV(`
    <div class="tv-label">VOTE — WHICH IS FUNNIER?</div>
    <div class="tv-heading">${prompt}</div>
    <div class="ans-grid">
      ${options.map(o => `
        <div class="ans-card" id="ac-${o.playerId}">
          <div class="ans-author">${o.avatar||'👤'} ${o.nickname}</div>
          <div class="ans-text">${o.answer}</div>
          <div class="vote-bar-wrap"><div class="vote-bar-fill" style="width:0" id="vb-${o.playerId}"></div></div>
        </div>
      `).join('')}
    </div>
    ${total > 0 ? dots(0,total) : ''}
  `);
});

socket.on('vote_results', ({tally, players:ps}) => {
  const total = Object.values(tally).reduce((a,b)=>a+b,0);
  Object.entries(tally).forEach(([pid,count]) => {
    const b = document.getElementById('vb-'+pid);
    if (b && total>0) b.style.width = (count/total*100)+'%';
    const c = document.getElementById('ac-'+pid);
    if (c) c.insertAdjacentHTML('beforeend',`<div class="vote-tally">${count} vote${count!==1?'s':''}</div>`);
  });
  updateScorebar(Object.values(ps));
});

// ─── FIBBAGE TV ───
socket.on('fibbage_round', ({round,totalRounds,category,prompt}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">FIBBAGE — ROUND ${round} OF ${totalRounds} — ${category}</div>
    <div class="tv-heading">${prompt}</div>
    <div class="status">Players are writing their lies...</div>
    ${dots(0,total)}
  `);
});

socket.on('fibbage_vote', ({prompt, answers}) => {
  const letters = ['A','B','C','D','E'];
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">WHICH IS THE TRUTH?</div>
    <div class="tv-heading">${prompt}</div>
    <div class="opts-grid">
      ${answers.map((a,i) => `<div class="opt-tv" id="fo-${a.id}"><div class="opt-ltr">${letters[i]}</div>${a.text}</div>`).join('')}
    </div>
    ${dots(0,total)}
  `);
});

socket.on('fibbage_results', ({truth, answers, players:ps}) => {
  answers.forEach(a => {
    const el = document.getElementById('fo-'+a.id);
    if (el) el.classList.add(a.isLie?'lose':'win');
  });
  const label = document.querySelector('#tv .tv-label');
  if (label) label.textContent = `THE TRUTH WAS: ${truth}`;
  updateScorebar(Object.values(ps));
});

// ─── DRAWFUL TV ───
socket.on('drawful_you_draw', ({round,totalRounds}) => {
  // This fires for the drawer only - not the TV screen
});

socket.on('drawful_watch', ({drawerName, drawerAvatar, round, totalRounds}) => {
  show('game');
  setTV(`
    <div class="tv-label">DRAWFUL — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${drawerAvatar||'🎨'} ${drawerName} IS DRAWING</div>
    <canvas class="tv-canvas" id="tv-canvas" width="600" height="420"></canvas>
    <div class="status">Everyone watching on their screens!</div>
  `);
  tvCanvas = document.getElementById('tv-canvas');
  tvCtx = tvCanvas.getContext('2d');
  tvCtx.fillStyle = 'white';
  tvCtx.fillRect(0,0,600,420);
});

socket.on('draw_stroke', ({stroke}) => {
  if (!tvCtx || !stroke || stroke.length < 2) return;
  tvCtx.beginPath();
  tvCtx.strokeStyle = stroke[0].color||'#000';
  tvCtx.lineWidth = stroke[0].size||4;
  tvCtx.lineCap = 'round'; tvCtx.lineJoin = 'round';
  tvCtx.moveTo(stroke[0].x*600, stroke[0].y*420);
  stroke.forEach(pt => tvCtx.lineTo(pt.x*600, pt.y*420));
  tvCtx.stroke();
});

socket.on('draw_cleared', () => {
  if (tvCtx && tvCanvas) { tvCtx.fillStyle='white'; tvCtx.fillRect(0,0,600,420); }
});

socket.on('guess_count', ({count,total}) => {
  const d = document.querySelector('#tv .dots');
  if (!d) {
    const tv = document.getElementById('tv');
    if (tv) tv.insertAdjacentHTML('beforeend', dots(count,total));
  } else updateDots(count,total);
  const h = document.querySelector('#tv .tv-heading');
  if (h && count > 0) h.textContent = `${count}/${total} guessed!`;
});

socket.on('drawful_vote', ({answers}) => {
  const letters = ['A','B','C','D','E','F'];
  const canvas = document.getElementById('tv-canvas');
  const canvasHTML = canvas ? `<canvas class="tv-canvas" id="tv-canvas" width="600" height="420"></canvas>` : '';
  const savedStrokes = tvCtx ? canvas.toDataURL() : null;
  setTV(`
    <div class="tv-label">VOTE — WHAT IS THIS DRAWING?</div>
    ${canvasHTML}
    <div class="opts-grid">
      ${answers.map((a,i) => `<div class="opt-tv" id="dvo-${a.id}"><div class="opt-ltr">${letters[i]}</div>${a.text}</div>`).join('')}
    </div>
    ${dots(0, Object.keys(players).length - 1)}
  `);
  // Restore canvas
  if (savedStrokes) {
    const newCanvas = document.getElementById('tv-canvas');
    if (newCanvas) {
      tvCanvas = newCanvas;
      tvCtx = newCanvas.getContext('2d');
      const img = new Image();
      img.onload = () => tvCtx.drawImage(img, 0, 0);
      img.src = savedStrokes;
    }
  }
});

socket.on('drawful_results', ({correctAnswer, answers, players:ps}) => {
  answers.forEach(a => {
    const el = document.getElementById('dvo-'+a.id);
    if (el) el.classList.add(a.isCorrect?'win':'lose');
  });
  const label = document.querySelector('#tv .tv-label');
  if (label) label.textContent = `THE ANSWER WAS: "${correctAnswer}"`;
  updateScorebar(Object.values(ps));
});

// ─── TRIVIA TV ───
socket.on('trivia_start', () => {
  show('game');
  setTV(`
    <div class="tv-heading">🧠 TRIVIA KNOCKOUT</div>
    <div class="status">Wrong answers = eliminated!</div>
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('trivia_question', ({question,options,questionNum,activePlayers,timeLimit}) => {
  const letters = ['A','B','C','D'];
  setTV(`
    <div class="tv-label">QUESTION ${questionNum} — ${activePlayers.length} PLAYERS ALIVE</div>
    <div class="tv-heading">${question}</div>
    <div class="opts-grid">
      ${options.map((o,i) => `<div class="opt-tv" id="to-${i}"><div class="opt-ltr">${letters[i]}</div>${o}</div>`).join('')}
    </div>
    ${dots(0,activePlayers.length)}
  `);
});

socket.on('trivia_reveal', ({correctAnswer, eliminated, players:ps}) => {
  document.querySelectorAll('[id^="to-"]').forEach(el => {
    const txt = el.textContent.trim().replace(/^[A-D]\s*/,'');
    el.classList.add(txt===correctAnswer?'win':'lose');
  });
  if (eliminated.length) {
    const lbl = document.querySelector('#tv .tv-label');
    if (lbl) lbl.textContent += ` — ❌ ${eliminated.length} ELIMINATED`;
  }
  updateScorebar(Object.values(ps));
});

// ─── POLL MINE TV ───
socket.on('pollmine_round', ({round,totalRounds,question,options}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">POLL MINE — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${question}</div>
    <div class="status">Everyone voting...</div>
    ${dots(0,total)}
  `);
});

socket.on('pollmine_predict', ({question}) => {
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">NOW RANK THEM!</div>
    <div class="tv-heading">${question}</div>
    <div class="status">Predict how the group voted — most to least popular</div>
    ${dots(0,total)}
  `);
});

socket.on('pollmine_results', ({question,tally,actualRanking,players:ps}) => {
  const total = Object.values(tally).reduce((a,b)=>a+b,0);
  const medals = ['🥇','🥈','🥉'];
  setTV(`
    <div class="tv-label">RESULTS</div>
    <div class="tv-heading">${question}</div>
    <div class="poll-bars">
      ${actualRanking.map((opt,i) => {
        const count = tally[opt]||0;
        const pct = total>0?(count/total*100):0;
        return `<div class="poll-row">
          <div class="poll-lbl"><span>${medals[i]||''} ${opt}</span><span>${count} vote${count!==1?'s':''}</span></div>
          <div class="poll-track"><div class="poll-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  `);
  updateScorebar(Object.values(ps));
});

// ─── MAFIA TV ───
socket.on('mafia_role', () => {
  show('game');
  setTV(`
    <div class="tv-heading">🔪 MAFIA</div>
    <div class="status">Players are reading their secret roles...</div>
    <div class="status" style="color:var(--red);font-weight:700">Don't show your screen to anyone!</div>
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('mafia_dawn', ({killed, killedName, killedAvatar, saved, alivePlayers}) => {
  setTV(`
    <div class="tv-label">DAWN — NIGHT ${alivePlayers ? '' : ''}</div>
    <div class="tv-heading" style="color:${saved?'var(--green)':killed?'var(--red)':'var(--yellow)'}">
      ${saved ? '💊 SOMEONE WAS SAVED!' : killed ? `💀 ${killedName} WAS KILLED` : '😮 NOBODY DIED'}
    </div>
    <div class="mafia-grid" id="mafia-grid">
      ${(alivePlayers||[]).map(p => `
        <div class="m-card">
          <div class="m-av" id="mav-${p.id}"></div>
          <span>${p.nickname}</span>
        </div>
      `).join('')}
    </div>
  `);
  (alivePlayers||[]).forEach(p => renderAv(p.avatar, document.getElementById('mav-'+p.id)));
});

socket.on('mafia_day_vote', ({alivePlayers}) => {
  setTV(`
    <div class="tv-label">DAY — VOTE SOMEONE OUT</div>
    <div class="tv-heading">Who is the Mafia?</div>
    <div class="mafia-grid" id="mafia-grid">
      ${(alivePlayers||[]).map(p => `
        <div class="m-card">
          <div class="m-av" id="mav-${p.id}"></div>
          <span>${p.nickname}</span>
        </div>
      `).join('')}
    </div>
    ${dots(0, alivePlayers.length)}
  `);
  (alivePlayers||[]).forEach(p => renderAv(p.avatar, document.getElementById('mav-'+p.id)));
});

socket.on('mafia_vote_result', ({eliminatedName, eliminatedRole, eliminatedRoleInfo, tied, alivePlayers}) => {
  setTV(`
    <div class="tv-label">VOTE RESULT</div>
    <div class="tv-heading" style="color:${tied?'var(--yellow)':'var(--red)'}">
      ${tied ? '🤝 TIE — NOBODY ELIMINATED' : `${eliminatedRoleInfo?.emoji||'💀'} ${eliminatedName} IS OUT — They were ${eliminatedRoleInfo?.name||'???'}`}
    </div>
    <div class="mafia-grid">
      ${(alivePlayers||[]).map(p => `
        <div class="m-card">
          <div class="m-av" id="mav2-${p.id}"></div>
          <span>${p.nickname}</span>
        </div>
      `).join('')}
    </div>
  `);
  (alivePlayers||[]).forEach(p => renderAv(p.avatar, document.getElementById('mav2-'+p.id)));
});

socket.on('mafia_game_over', ({winner, allRoles}) => {
  setTV(`
    <div class="tv-heading" style="color:${winner==='village'?'var(--green)':'var(--red)'}">
      ${winner==='village'?'🏘️ VILLAGE WINS!':'🔪 MAFIA WINS!'}
    </div>
    <div class="mafia-grid">
      ${allRoles.map(r => `
        <div class="m-card" style="border-color:${r.role==='mafia'?'var(--red)':'var(--green)'}">
          <div class="m-av" id="mravf-${r.id}"></div>
          <span>${r.nickname}</span>
          <span style="color:var(--muted);font-size:12px">${r.roleInfo.emoji} ${r.roleInfo.name}</span>
        </div>
      `).join('')}
    </div>
  `);
  allRoles.forEach(r => renderAv(r.avatar, document.getElementById('mravf-'+r.id)));
});

// ─── FINAL SCORES ───
socket.on('final_scores', ({scores, gameName}) => {
  const medals=['🥇','🥈','🥉'];
  setTimeout(() => {
    setTV(`
      <div class="tv-label">GAME OVER — ${gameName.toUpperCase()}</div>
      <div class="tv-heading">Final Scores</div>
      <div class="scores-list">
        ${scores.map((p,i) => `
          <div class="score-row" style="animation-delay:${i*.1}s">
            <div class="s-rank ${i===0?'g':i===1?'s':i===2?'b':''}">${medals[i]||(i+1)}</div>
            <div class="s-av" id="fsav-${p.id}"></div>
            <div class="s-name">${p.nickname}</div>
            <div class="s-score">${p.score}</div>
          </div>
        `).join('')}
      </div>
    `);
    scores.forEach(p => renderAv(p.avatar, document.getElementById('fsav-'+p.id)));
  }, 1000);
});

socket.on('game_over', ({scores}) => {
  setTimeout(() => {
    const tv = document.getElementById('tv');
    if (tv) tv.insertAdjacentHTML('beforeend', `
      <button class="btn" style="max-width:280px;margin-top:8px" onclick="socket.emit('return_to_lobby')">Back to Lobby</button>
    `);
  }, 4000);
});

socket.on('game_ended', ({returnToLobby}) => {
  if (returnToLobby) show('lobby');
});
</script>
</body>
</html>
