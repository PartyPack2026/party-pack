<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couch Pack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--s:#141414;--b:#222;--t:#f5f5f5;--m:#555;--r:#ff2d2d;--g:#00f076;--y:#ffe62d;--o:#ff8c00;--p:#cc2dff}
body{background:var(--bg);color:var(--t);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow:hidden}

/* ── SCREENS ── */
.screen{display:none;width:100vw;height:100vh;position:relative}
.screen.active{display:flex;flex-direction:column}

/* ── ANIMATED BG ── */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,230,45,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,230,45,.04) 1px,transparent 1px);
  background-size:60px 60px;animation:gridMove 20s linear infinite}
@keyframes gridMove{from{background-position:0 0}to{background-position:60px 60px}}

.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,230,45,.08) 0%,transparent 70%);
  top:-100px;left:-100px;animation:floatA 12s ease-in-out infinite}
.bg-glow::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(204,45,255,.06) 0%,transparent 70%);
  bottom:-100px;right:-100px;animation:floatB 15s ease-in-out infinite}
@keyframes floatA{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes floatB{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}

/* ── LOBBY ── */
#s-lobby{justify-content:space-between;align-items:stretch;padding:0}

.lobby-top{display:flex;align-items:center;justify-content:space-between;padding:28px 40px;position:relative;z-index:1}

.logo{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',cursive;font-size:72px;color:var(--y);letter-spacing:4px;
  text-shadow:0 0 40px rgba(255,230,45,.4);animation:logoGlow 3s ease-in-out infinite alternate}
@keyframes logoGlow{from{text-shadow:0 0 20px rgba(255,230,45,.3)}to{text-shadow:0 0 60px rgba(255,230,45,.7),0 0 100px rgba(255,230,45,.3)}}
.logo-sub{font-size:13px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--m);margin-top:-8px}

.join-info{display:flex;flex-direction:column;align-items:center;gap:12px}
.join-code-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--m)}
.join-code{font-family:'Bebas Neue',cursive;font-size:80px;color:var(--y);letter-spacing:16px;line-height:1;
  animation:codePulse 2s ease-in-out infinite}
@keyframes codePulse{0%,100%{opacity:1}50%{opacity:.7}}
.join-url-text{font-size:14px;color:var(--y);letter-spacing:1px;font-weight:700}
#qr-img{width:110px;height:110px;border-radius:8px;border:3px solid var(--b);cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s}
#qr-img:hover{transform:scale(1.08);border-color:var(--y);box-shadow:0 0 24px rgba(255,230,45,.3)}

/* QR fullscreen overlay */
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:pointer}
.qr-overlay.open{display:flex}
.qr-overlay-img{width:340px;height:340px;border-radius:16px;border:4px solid var(--y);box-shadow:0 0 80px rgba(255,230,45,.4)}
.qr-big-label{font-family:'Bebas Neue',cursive;font-size:36px;color:var(--y);letter-spacing:4px}
.qr-big-url{font-size:22px;font-weight:700;color:var(--t);letter-spacing:1px}
.qr-close-hint{font-size:12px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-top:8px}

/* Player wall */
.lobby-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:0 40px;position:relative;z-index:1}
.player-wall{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:center;max-width:900px}
.p-card{background:var(--s);border:2px solid var(--b);border-radius:16px;padding:20px 24px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:cardIn .4s cubic-bezier(.34,1.56,.64,1) both;min-width:120px}
@keyframes cardIn{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.p-card-av{width:56px;height:56px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--b);border:2px solid var(--b)}
.p-card-av img{width:100%;height:100%;object-fit:cover}
.p-card-name{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;text-align:center}
.p-card-score{font-size:12px;color:var(--m);font-weight:700}

.waiting-msg{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--m);letter-spacing:3px;text-align:center;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* Game selector strip */
.lobby-bottom{padding:24px 40px;position:relative;z-index:1;display:flex;flex-direction:column;gap:12px}
.game-strip{display:flex;gap:12px}
.g-btn{flex:1;background:var(--s);border:2px solid var(--b);border-radius:14px;padding:16px 12px;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;overflow:hidden}
.g-btn::before{content:'';position:absolute;inset:0;background:var(--y);opacity:0;transition:opacity .2s}
.g-btn:hover::before{opacity:.06}
.g-btn.on{border-color:var(--y);background:rgba(255,230,45,.05)}
.g-btn.on .g-name{color:var(--y)}
.g-icon{font-size:0;width:32px;height:32px;background:var(--b);border-radius:8px;display:flex;align-items:center;justify-content:center}
.g-btn.on .g-icon{background:var(--y)}
.g-icon svg{width:18px;height:18px;fill:var(--m)}
.g-btn.on .g-icon svg{fill:#000}
.g-name{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;color:var(--m);text-align:center;transition:color .2s}
.g-players{font-size:10px;font-weight:700;color:var(--m);letter-spacing:1px;text-transform:uppercase}

.lobby-actions{display:flex;gap:12px;align-items:center}
.start-btn{flex:1;background:var(--y);border:none;border-radius:12px;padding:18px;
  font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:#000;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden}
.start-btn::after{content:'';position:absolute;inset:0;background:white;opacity:0;transition:opacity .15s}
.start-btn:hover::after{opacity:.1}
.start-btn:active{transform:scale(.98)}
.start-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.player-count-bar{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:16px 24px;
  display:flex;align-items:center;gap:10px;white-space:nowrap}
.pc-num{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--y)}
.pc-label{font-size:12px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:1px}

/* ticker */
.ticker{position:fixed;bottom:0;left:0;right:0;background:var(--y);padding:6px 0;z-index:100;overflow:hidden}
.ticker-inner{display:flex;gap:60px;animation:tick 30s linear infinite;white-space:nowrap}
.ticker-inner span{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:#000;flex-shrink:0}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── GAME SCREEN ── */
#s-game{flex-direction:column}
.game-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;
  background:var(--s);border-bottom:2px solid var(--b);z-index:10;flex-shrink:0}
.game-bar-left{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:var(--y)}
.scorebar{display:flex;gap:8px;overflow-x:auto;flex:1;margin:0 16px;scrollbar-width:none}
.scorebar::-webkit-scrollbar{display:none}
.s-chip{background:var(--bg);border:2px solid var(--b);border-radius:100px;padding:7px 16px;
  display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;white-space:nowrap;flex-shrink:0}
.s-chip-av{width:24px;height:24px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--b)}
.s-chip-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.s-pts{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--y)}
.skip-btn{background:var(--bg);border:2px solid var(--b);border-radius:8px;padding:7px 14px;
  color:var(--m);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;cursor:pointer;
  transition:all .15s;white-space:nowrap}
.skip-btn:hover{border-color:var(--y);color:var(--y)}

.tv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px;gap:20px;overflow:hidden;position:relative;z-index:1}
.tv-label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--m)}
.tv-heading{font-family:'Bebas Neue',cursive;font-size:clamp(28px,5vw,64px);text-align:center;
  color:var(--y);max-width:900px;line-height:1;letter-spacing:1px}
.tv-canvas{border-radius:12px;background:white;max-width:680px;width:100%;height:clamp(280px,40vh,460px);display:block}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:960px}
.ans-card{background:var(--s);border:2px solid var(--b);border-radius:14px;padding:18px 20px;
  display:flex;flex-direction:column;gap:8px;transition:all .4s}
.ans-card.win{border-color:var(--g);background:rgba(0,240,118,.06)}
.ans-card.lose{opacity:.35}
.ans-author{font-size:11px;color:var(--m);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.ans-text{font-size:clamp(15px,2.2vw,22px);font-weight:700;line-height:1.3}
.vbar-wrap{height:3px;background:var(--b);border-radius:100px;overflow:hidden;margin-top:4px}
.vbar-fill{height:100%;background:var(--y);border-radius:100px;transition:width 1.2s ease}
.vtally{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--y);margin-top:2px}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:960px}
.opt-tv{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:14px 18px;
  font-size:clamp(13px,1.8vw,17px);font-weight:700;display:flex;align-items:center;gap:10px;transition:all .3s}
.opt-tv.win{border-color:var(--g);background:rgba(0,240,118,.06)}
.opt-tv.lose{opacity:.3}
.opt-ltr{width:28px;height:28px;border-radius:6px;background:var(--b);display:flex;align-items:center;
  justify-content:center;font-family:'Bebas Neue',cursive;font-size:16px;color:var(--y);flex-shrink:0}

.poll-bars{display:flex;flex-direction:column;gap:10px;width:100%;max-width:800px}
.poll-row{display:flex;flex-direction:column;gap:4px}
.poll-lbl{font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.poll-track{height:14px;background:var(--b);border-radius:100px;overflow:hidden}
.poll-fill{height:100%;background:linear-gradient(90deg,var(--y),var(--o));border-radius:100px;transition:width 1.2s ease}

.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.dot{width:7px;height:7px;border-radius:50%;background:var(--b);transition:background .3s}
.dot.on{background:var(--g)}

.scores-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:700px}
.sr{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:14px 20px;
  display:flex;align-items:center;gap:14px;animation:slideIn .5s ease both}
@keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
.sr-rank{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--m);width:42px;text-align:center}
.sr-rank.g{color:var(--y)}.sr-rank.s{color:#aaa}.sr-rank.b{color:#cd7f32}
.sr-av{width:36px;height:36px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--b);flex-shrink:0}
.sr-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sr-name{font-weight:700;font-size:16px;flex:1}
.sr-pts{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--y)}

/* Mafia player grid */
.mafia-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;width:100%;max-width:860px}
.m-card{background:var(--s);border:2px solid var(--b);border-radius:12px;padding:14px;
  display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;font-size:14px;text-align:center}
.m-card.dead{opacity:.25;border-style:dashed}
.m-av{width:48px;height:48px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--b);flex-shrink:0}
.m-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ticker */
.ticker{position:fixed;bottom:0;left:0;right:0;background:var(--y);padding:6px 0;z-index:100;overflow:hidden}
.ticker-inner{display:flex;gap:60px;animation:tick 30s linear infinite;white-space:nowrap}
.ticker-inner span{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:#000;flex-shrink:0}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.pulse{display:flex;gap:6px;justify-content:center}
.pulse span{width:8px;height:8px;border-radius:50%;background:var(--m);animation:pa 1.2s ease-in-out infinite}
.pulse span:nth-child(2){animation-delay:.2s}.pulse span:nth-child(3){animation-delay:.4s}
@keyframes pa{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.status-txt{color:var(--m);font-size:14px;font-weight:500;text-align:center}

/* custom prompts modal removed */
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- QR FULLSCREEN OVERLAY -->
<div class="qr-overlay" id="qr-overlay" onclick="closeQR()">
  <div class="qr-big-label">Scan to Join</div>
  <img class="qr-overlay-img" id="qr-big" src="" alt="QR Code"/>
  <div class="qr-big-url" id="qr-big-url">couchpack.one/join</div>
  <div class="qr-close-hint">Tap anywhere to close</div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen active">
  <div class="lobby-top">
    <div class="logo">
      <div class="logo-main">Couch Pack</div>
      <div class="logo-sub">The Party Game</div>
    </div>
    <div class="join-info">
      <div class="join-code-label">Go to couchpack.one/join · Code</div>
      <div class="join-code" id="room-code">----</div>
      <div class="join-url-text">couchpack.one/join</div>
    </div>
    <img id="qr-img" style="display:none" src="" alt="QR Code" onclick="openQR()" title="Click to enlarge"/>
  </div>

  <div class="lobby-mid">
    <div id="player-wall" class="player-wall">
      <div class="waiting-msg">Waiting for players to join...</div>
    </div>
  </div>

  <div class="lobby-bottom">
    <div class="game-strip" id="game-strip">
      <button class="g-btn on" onclick="selGame('Quiplash','gq')" id="gq">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2c0-3.25 3-3 3-5 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 2.5-3 2.75-3 5z"/></svg></div>
        <div class="g-name">Quiplash</div>
        <div class="g-players">2+ players</div>
      </button>
      <button class="g-btn" onclick="selGame('Fibbage','gf')" id="gf">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
        <div class="g-name">Fibbage</div>
        <div class="g-players">2+ players</div>
      </button>
      <button class="g-btn" onclick="selGame('Drawful','gd')" id="gd">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
        <div class="g-name">Drawful</div>
        <div class="g-players">2+ players</div>
      </button>
      <button class="g-btn" onclick="selGame('TriviaKnockout','gt')" id="gt">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg></div>
        <div class="g-name">Trivia</div>
        <div class="g-players">2+ players</div>
      </button>
      <button class="g-btn" onclick="selGame('PollMine','gp')" id="gp">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
        <div class="g-name">Poll Mine</div>
        <div class="g-players">2+ players</div>
      </button>
      <button class="g-btn" onclick="selGame('Mafia','gm')" id="gm">
        <div class="g-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
        <div class="g-name">Mafia</div>
        <div class="g-players">4+ players</div>
      </button>
    </div>

    <div class="lobby-actions">
      <div class="player-count-bar">
        <div class="pc-num" id="p-count">0</div>
        <div class="pc-label">Players<br>Joined</div>
      </div>
      <button class="start-btn" id="start-btn" disabled onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="s-game" class="screen">
  <div class="game-bar">
    <div class="game-bar-left" id="game-label">Game</div>
    <div class="scorebar" id="scorebar"></div>
    <button class="skip-btn" onclick="socket.emit('next_phase')">Skip Phase</button>
  </div>
  <div class="bg-grid"></div>
  <div class="tv" id="tv">
    <div class="pulse"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker" id="ticker" style="display:none">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<!-- AUDIO -->
<audio id="audio-theme" src="/audio/main-theme.mp3" loop></audio>
<audio id="audio-q" src="/audio/btn-quiplash.mp3"></audio>
<audio id="audio-f" src="/audio/btn-fibbage.mp3"></audio>
<audio id="audio-d" src="/audio/btn-drawful.mp3"></audio>
<audio id="audio-t" src="/audio/btn-trivia.mp3"></audio>
<audio id="audio-p" src="/audio/btn-pollmine.mp3"></audio>
<audio id="audio-m" src="/audio/btn-mafia.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myCode = null, players = {}, selectedGame = 'Quiplash';
let tvCanvas, tvCtx, musicStarted = false;
let timers = {};

// Start music on first interaction
document.addEventListener('click', () => {
  if (!musicStarted) {
    const theme = document.getElementById('audio-theme');
    theme.volume = 0.4;
    theme.play().catch(()=>{});
    musicStarted = true;
  }
}, { once: true });

// Create room immediately on load
socket.emit('create_room');

socket.on('room_created', ({ code }) => {
  myCode = code;
  document.getElementById('room-code').textContent = code;
  fetchQR(code);
  startTicker();
});

socket.on('room_update', ({ players: ps, phase }) => {
  players = {};
  ps.forEach(p => players[p.id] = p);
  renderPlayers(ps);
  updateScorebar(ps);
  document.getElementById('p-count').textContent = ps.length;
  const min = selectedGame === 'Mafia' ? 4 : 2;
  document.getElementById('start-btn').disabled = ps.length < min;
  if (phase === 'lobby') {
    show('lobby');
    fadeInMusic();
  }
});

function fetchQR(code) {
  fetch('/qr/' + code).then(r => r.json()).then(d => {
    const img = document.getElementById('qr-img');
    img.src = d.qr; img.style.display = 'block';
    document.getElementById('qr-big').src = d.qr;
  });
}

function openQR() {
  document.getElementById('qr-overlay').classList.add('open');
}
function closeQR() {
  document.getElementById('qr-overlay').classList.remove('open');
}

function renderPlayers(ps) {
  const wall = document.getElementById('player-wall');
  if (ps.length === 0) {
    wall.innerHTML = '<div class="waiting-msg">Waiting for players to join...</div>';
    return;
  }
  wall.innerHTML = ps.map(p => `
    <div class="p-card">
      <div class="p-card-av" id="pav-${p.id}"></div>
      <div class="p-card-name">${p.nickname}</div>
      <div class="p-card-score">${p.score} pts</div>
    </div>
  `).join('');
  ps.forEach(p => renderAv(p.avatar, document.getElementById('pav-' + p.id)));
}

function renderAv(avatar, el) {
  if (!el) return;
  if (avatar && avatar.startsWith('data:')) {
    el.innerHTML = `<img src="${avatar}">`;
  } else if (avatar) {
    el.textContent = avatar;
  }
}

function updateScorebar(ps) {
  const sorted = [...ps].sort((a,b) => b.score - a.score);
  document.getElementById('scorebar').innerHTML = sorted.map(p => `
    <div class="s-chip">
      <div class="s-chip-av" id="sbav-${p.id}"></div>
      ${p.nickname}
      <span class="s-pts">${p.score}</span>
    </div>
  `).join('');
  sorted.forEach(p => renderAv(p.avatar, document.getElementById('sbav-' + p.id)));
}

function selGame(name, btnId) {
  const sounds = {Quiplash:'q',Fibbage:'f',Drawful:'d',TriviaKnockout:'t',PollMine:'p',Mafia:'m'};
  const snd = document.getElementById('audio-' + sounds[name]);
  if (snd) { snd.currentTime = 0; snd.play().catch(()=>{}); }
  selectedGame = name;
  document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(btnId).classList.add('on');
  const min = name === 'Mafia' ? 4 : 2;
  document.getElementById('start-btn').disabled = Object.keys(players).length < min;
}

function startGame() {
  socket.emit('start_game', { gameName: selectedGame });
  const labels = {Quiplash:'QUIPLASH',Fibbage:'FIBBAGE',Drawful:'DRAWFUL',TriviaKnockout:'TRIVIA KNOCKOUT',PollMine:'POLL MINE',Mafia:'MAFIA'};
  document.getElementById('game-label').textContent = labels[selectedGame] || selectedGame;
  show('game');
  document.getElementById('ticker').style.display = 'none';
  fadeOutMusic();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
}

function setTV(html) { document.getElementById('tv').innerHTML = html; }

function dots(count, total) {
  return `<div class="dots">${Array(total).fill(0).map((_,i) =>
    `<div class="dot${i < count ? ' on' : ''}"></div>`).join('')}</div>`;
}

function updateDots(count, total) {
  const d = document.querySelector('#tv .dots');
  if (d) d.innerHTML = Array(total).fill(0).map((_,i) =>
    `<div class="dot${i < count ? ' on' : ''}"></div>`).join('');
}

// Music helpers
function fadeOutMusic() {
  const a = document.getElementById('audio-theme');
  let v = a.volume;
  const fade = setInterval(() => {
    v = Math.max(0, v - 0.05);
    a.volume = v;
    if (v <= 0) { clearInterval(fade); a.pause(); }
  }, 100);
}
function fadeInMusic() {
  const a = document.getElementById('audio-theme');
  a.volume = 0;
  a.play().catch(()=>{});
  let v = 0;
  const fade = setInterval(() => {
    v = Math.min(0.4, v + 0.05);
    a.volume = v;
    if (v >= 0.4) clearInterval(fade);
  }, 100);
}

// Ticker
function startTicker() {
  const msgs = [
    'JOIN WITH YOUR PHONE', 'NO APP NEEDED', 'SCAN THE QR CODE',
    'COUCH PACK', 'THE PARTY GAME', 'GO TO COUCHPACK.ONE/JOIN'
  ];
  const doubled = [...msgs, ...msgs];
  const inner = document.getElementById('ticker-inner');
  inner.innerHTML = doubled.map(m => `<span>${m} &nbsp;—&nbsp;</span>`).join('');
  document.getElementById('ticker').style.display = 'block';
}

// ─── SHARED SOCKET EVENTS ───
socket.on('player_answered', ({count,total}) => updateDots(count,total));
socket.on('vote_received', ({count,total}) => updateDots(count,total));
socket.on('guess_count', ({count,total}) => {
  updateDots(count,total);
  const h = document.querySelector('#tv .tv-heading');
  if (h && total > 0) h.textContent = `${count} / ${total} guessed`;
});
socket.on('vote_count', ({count,total}) => updateDots(count,total));

// ─── QUIPLASH ───
socket.on('quiplash_round', ({round,totalRounds}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">QUIPLASH — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">Write your funniest answer!</div>
    <div class="status-txt">Check your phone</div>
    ${dots(0,total)}
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('quiplash_vote', ({prompt, options}) => {
  const nonCompeting = Object.keys(players).length - 2;
  setTV(`
    <div class="tv-label">VOTE NOW</div>
    <div class="tv-heading">${prompt}</div>
    <div class="ans-grid">
      ${options.map(o => `
        <div class="ans-card" id="ac-${o.playerId}">
          <div class="ans-author">${o.nickname}</div>
          <div class="ans-text">${o.answer}</div>
          <div class="vbar-wrap"><div class="vbar-fill" style="width:0" id="vb-${o.playerId}"></div></div>
        </div>
      `).join('')}
    </div>
    ${nonCompeting > 0 ? dots(0, nonCompeting) : ''}
  `);
});

socket.on('vote_results', ({tally, players:ps}) => {
  const total = Object.values(tally).reduce((a,b)=>a+b,0);
  Object.entries(tally).forEach(([pid,count]) => {
    const b = document.getElementById('vb-'+pid);
    if (b && total>0) b.style.width = (count/total*100)+'%';
    const c = document.getElementById('ac-'+pid);
    if (c) c.insertAdjacentHTML('beforeend',`<div class="vtally">${count} vote${count!==1?'s':''}</div>`);
  });
  // Highlight winner
  const maxVotes = Math.max(...Object.values(tally));
  Object.entries(tally).forEach(([pid,count]) => {
    const c = document.getElementById('ac-'+pid);
    if (c) c.classList.add(count === maxVotes ? 'win' : 'lose');
  });
  updateScorebar(Object.values(ps));
});

// ─── FIBBAGE ───
socket.on('fibbage_round', ({round,totalRounds,category,prompt}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">FIBBAGE — ROUND ${round} OF ${totalRounds} — ${category}</div>
    <div class="tv-heading">${prompt}</div>
    <div class="status-txt">Write a convincing lie on your phone</div>
    ${dots(0,total)}
  `);
});

socket.on('fibbage_vote', ({prompt,answers}) => {
  const letters = ['A','B','C','D','E'];
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">WHICH IS THE TRUTH?</div>
    <div class="tv-heading">${prompt}</div>
    <div class="opts-grid">
      ${answers.map((a,i) => `<div class="opt-tv" id="fo-${a.id}"><div class="opt-ltr">${letters[i]}</div>${a.text}</div>`).join('')}
    </div>
    ${dots(0,total)}
  `);
});

socket.on('fibbage_results', ({truth,answers,players:ps}) => {
  answers.forEach(a => {
    const el = document.getElementById('fo-'+a.id);
    if (el) el.classList.add(a.isLie?'lose':'win');
  });
  const lbl = document.querySelector('#tv .tv-label');
  if (lbl) lbl.textContent = 'THE TRUTH: ' + truth.toUpperCase();
  updateScorebar(Object.values(ps));
});

// ─── DRAWFUL ───
socket.on('drawful_watch', ({drawerName,round,totalRounds}) => {
  show('game');
  setTV(`
    <div class="tv-label">DRAWFUL — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${drawerName} is drawing...</div>
    <canvas class="tv-canvas" id="tv-canvas" width="680" height="460"></canvas>
    <div class="status-txt">Everyone watching on their phones!</div>
  `);
  tvCanvas = document.getElementById('tv-canvas');
  tvCtx = tvCanvas.getContext('2d');
  tvCtx.fillStyle = 'white';
  tvCtx.fillRect(0,0,680,460);
});

socket.on('draw_stroke', ({stroke}) => {
  if (!tvCtx || !stroke || stroke.length < 2) return;
  tvCtx.beginPath();
  tvCtx.strokeStyle = stroke[0].color||'#000';
  tvCtx.lineWidth = stroke[0].size||4;
  tvCtx.lineCap='round'; tvCtx.lineJoin='round';
  tvCtx.moveTo(stroke[0].x*680, stroke[0].y*460);
  stroke.forEach(pt => tvCtx.lineTo(pt.x*680, pt.y*460));
  tvCtx.stroke();
});

socket.on('draw_cleared', () => {
  if (tvCtx && tvCanvas) { tvCtx.fillStyle='white'; tvCtx.fillRect(0,0,680,460); }
});

socket.on('drawful_vote', ({answers}) => {
  const letters = ['A','B','C','D','E','F'];
  const savedImg = tvCanvas ? tvCanvas.toDataURL() : null;
  setTV(`
    <div class="tv-label">WHAT IS THIS?</div>
    <canvas class="tv-canvas" id="tv-canvas" width="680" height="460" style="height:200px"></canvas>
    <div class="opts-grid">
      ${answers.map((a,i) => `<div class="opt-tv" id="dvo-${a.id}"><div class="opt-ltr">${letters[i]}</div>${a.text}</div>`).join('')}
    </div>
    ${dots(0, Object.keys(players).length - 1)}
  `);
  if (savedImg) {
    tvCanvas = document.getElementById('tv-canvas');
    tvCtx = tvCanvas.getContext('2d');
    const img = new Image(); img.onload = ()=>tvCtx.drawImage(img,0,0,680,200); img.src = savedImg;
  }
});

socket.on('drawful_results', ({correctAnswer,answers,players:ps}) => {
  answers.forEach(a => {
    const el = document.getElementById('dvo-'+a.id);
    if (el) el.classList.add(a.isCorrect?'win':'lose');
  });
  const lbl = document.querySelector('#tv .tv-label');
  if (lbl) lbl.textContent = `THE ANSWER: "${correctAnswer.toUpperCase()}"`;
  updateScorebar(Object.values(ps));
});

// ─── TRIVIA ───
socket.on('trivia_start', () => {
  show('game');
  setTV(`
    <div class="tv-heading">Trivia Knockout</div>
    <div class="status-txt">Wrong answers get eliminated. Last one standing wins!</div>
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('trivia_question', ({question,options,questionNum,activePlayers}) => {
  const letters=['A','B','C','D'];
  setTV(`
    <div class="tv-label">QUESTION ${questionNum} — ${activePlayers.length} PLAYERS ALIVE</div>
    <div class="tv-heading">${question}</div>
    <div class="opts-grid">
      ${options.map((o,i)=>`<div class="opt-tv" id="to-${i}"><div class="opt-ltr">${letters[i]}</div>${o}</div>`).join('')}
    </div>
    ${dots(0,activePlayers.length)}
  `);
});

socket.on('trivia_reveal', ({correctAnswer,eliminated,players:ps}) => {
  document.querySelectorAll('[id^="to-"]').forEach(el => {
    const txt = el.textContent.trim().replace(/^[A-D]\s*/,'');
    el.classList.add(txt===correctAnswer?'win':'lose');
  });
  if (eliminated.length) {
    const lbl = document.querySelector('#tv .tv-label');
    if (lbl) lbl.textContent += ` — ${eliminated.length} ELIMINATED`;
  }
  updateScorebar(Object.values(ps));
});

// ─── POLL MINE ───
socket.on('pollmine_round', ({round,totalRounds,question}) => {
  show('game');
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">POLL MINE — ROUND ${round} OF ${totalRounds}</div>
    <div class="tv-heading">${question}</div>
    <div class="status-txt">Everyone voting on their phones...</div>
    ${dots(0,total)}
  `);
});

socket.on('pollmine_predict', ({question}) => {
  const total = Object.keys(players).length;
  setTV(`
    <div class="tv-label">NOW RANK THEM</div>
    <div class="tv-heading">${question}</div>
    <div class="status-txt">Predict the group's ranking on your phone!</div>
    ${dots(0,total)}
  `);
});

socket.on('pollmine_results', ({question,tally,actualRanking,players:ps}) => {
  const total = Object.values(tally).reduce((a,b)=>a+b,0);
  const medals=['#1','#2','#3'];
  setTV(`
    <div class="tv-label">RESULTS</div>
    <div class="tv-heading">${question}</div>
    <div class="poll-bars">
      ${actualRanking.map((opt,i)=>{
        const count=tally[opt]||0;
        const pct=total>0?(count/total*100):0;
        return `<div class="poll-row">
          <div class="poll-lbl"><span>${medals[i]||''} ${opt}</span><span style="color:var(--y)">${count} vote${count!==1?'s':''}</span></div>
          <div class="poll-track"><div class="poll-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  `);
  updateScorebar(Object.values(ps));
});

// ─── MAFIA ───
socket.on('mafia_role', () => {
  show('game');
  setTV(`
    <div class="tv-heading">Mafia</div>
    <div class="status-txt">Players are reading their secret roles on their phones.</div>
    <div class="status-txt" style="color:var(--r);font-weight:700;margin-top:8px">Don't show your screen to anyone!</div>
    <div class="pulse"><span></span><span></span><span></span></div>
  `);
});

socket.on('mafia_dawn', ({killedName,saved,alivePlayers}) => {
  setTV(`
    <div class="tv-label">DAWN</div>
    <div class="tv-heading" style="color:${saved?'var(--g)':killedName?'var(--r)':'var(--y)'}">
      ${saved?'Someone was saved!':killedName?`${killedName} was killed`:'Nobody died tonight'}
    </div>
    <div class="mafia-grid">${(alivePlayers||[]).map(p=>`
      <div class="m-card"><div class="m-av" id="mav-${p.id}"></div><span>${p.nickname}</span></div>
    `).join('')}</div>
  `);
  (alivePlayers||[]).forEach(p=>renderAv(p.avatar,document.getElementById('mav-'+p.id)));
});

socket.on('mafia_day_vote', ({alivePlayers}) => {
  setTV(`
    <div class="tv-label">DAY — DISCUSSION & VOTE</div>
    <div class="tv-heading">Who is the Mafia?</div>
    <div class="status-txt">Talk it out, then vote on your phones!</div>
    <div class="mafia-grid">${(alivePlayers||[]).map(p=>`
      <div class="m-card"><div class="m-av" id="mav-${p.id}"></div><span>${p.nickname}</span></div>
    `).join('')}</div>
    ${dots(0,alivePlayers.length)}
  `);
  (alivePlayers||[]).forEach(p=>renderAv(p.avatar,document.getElementById('mav-'+p.id)));
});

socket.on('mafia_vote_result', ({eliminatedName,eliminatedRoleInfo,tied,alivePlayers}) => {
  setTV(`
    <div class="tv-label">VOTE RESULT</div>
    <div class="tv-heading" style="color:${tied?'var(--y)':'var(--r)'}">
      ${tied?'Tie — nobody eliminated':`${eliminatedName} is out — they were ${eliminatedRoleInfo?.name||'???'}`}
    </div>
    <div class="mafia-grid">${(alivePlayers||[]).map(p=>`
      <div class="m-card"><div class="m-av" id="mav2-${p.id}"></div><span>${p.nickname}</span></div>
    `).join('')}</div>
  `);
  (alivePlayers||[]).forEach(p=>renderAv(p.avatar,document.getElementById('mav2-'+p.id)));
});

socket.on('mafia_game_over', ({winner,allRoles}) => {
  setTV(`
    <div class="tv-heading" style="color:${winner==='village'?'var(--g)':'var(--r)'}">
      ${winner==='village'?'Village Wins!':'Mafia Wins!'}
    </div>
    <div class="mafia-grid">${allRoles.map(r=>`
      <div class="m-card" style="border-color:${r.role==='mafia'?'var(--r)':'var(--g)'}">
        <div class="m-av" id="mravf-${r.id}"></div>
        <span>${r.nickname}</span>
        <span style="color:var(--m);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px">${r.roleInfo.name}</span>
      </div>
    `).join('')}</div>
  `);
  allRoles.forEach(r=>renderAv(r.avatar,document.getElementById('mravf-'+r.id)));
});

// ─── FINAL SCORES ───
socket.on('final_scores', ({scores,gameName}) => {
  const medals=['1ST','2ND','3RD'];
  setTimeout(()=>{
    setTV(`
      <div class="tv-label">GAME OVER — ${gameName.toUpperCase()}</div>
      <div class="tv-heading">Final Scores</div>
      <div class="scores-list">
        ${scores.map((p,i)=>`
          <div class="sr" style="animation-delay:${i*.12}s">
            <div class="sr-rank ${i===0?'g':i===1?'s':i===2?'b':''}">${medals[i]||(i+1)}</div>
            <div class="sr-av" id="fsav-${p.id}"></div>
            <div class="sr-name">${p.nickname}</div>
            <div class="sr-pts">${p.score} pts</div>
          </div>
        `).join('')}
      </div>
    `);
    scores.forEach(p=>renderAv(p.avatar,document.getElementById('fsav-'+p.id)));
  },800);
});

socket.on('game_over', ()=>{
  setTimeout(()=>{
    const tv = document.getElementById('tv');
    if (tv) tv.insertAdjacentHTML('beforeend',`
      <button onclick="socket.emit('return_to_lobby')" style="background:var(--y);border:none;border-radius:12px;padding:16px 40px;font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:#000;cursor:pointer;margin-top:8px">
        Back to Lobby
      </button>
    `);
  },4000);
});

socket.on('game_ended', ({returnToLobby})=>{
  if (returnToLobby) {
    show('lobby');
    document.getElementById('ticker').style.display = 'block';
    fadeInMusic();
  }
});

socket.on('host_disconnected', ()=>{
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Bebas Neue,cursive;font-size:40px;color:#ff2d2d">Host Disconnected</div>';
});
</script>
</body>
</html>
