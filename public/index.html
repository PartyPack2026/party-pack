<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party Pack — Host</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap');
:root{--purple:#6c3fc5;--pink:#e8357a;--yellow:#ffd93d;--teal:#00c9a7;--orange:#ff6b35;--dark:#1a1a2e;--card:#16213e;--text:#eaf4fb}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh}
.screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.screen.active{display:flex}
h1{font-family:'Fredoka One',cursive;font-size:clamp(32px,6vw,72px);background:linear-gradient(135deg,var(--yellow),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h2{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,36px);color:var(--yellow);text-align:center}
.subtitle{color:#888;font-size:14px;text-transform:uppercase;letter-spacing:2px;font-weight:700}
input,textarea{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;padding:16px 20px;width:100%;max-width:400px;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--purple)}
textarea{resize:none;height:110px}
.btn{width:100%;max-width:400px;padding:18px;border-radius:100px;border:none;font-family:'Fredoka One',cursive;font-size:22px;cursor:pointer;transition:all .2s;color:white}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--pink))}
.btn-primary:hover{transform:scale(1.03)}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-teal{background:linear-gradient(135deg,var(--teal),#00a8cc)}
.btn-secondary{background:rgba(255,255,255,.1);font-size:16px;font-family:'Nunito',sans-serif;font-weight:800}
.btn-answer{background:var(--card);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer;transition:all .15s;color:var(--text);width:100%;max-width:400px;text-align:left;display:flex;align-items:center;gap:12px}
.btn-answer:active{transform:scale(.97)}
.btn-answer.selected{border-color:var(--teal);background:rgba(0,201,167,.15)}
.btn-answer.disabled-opt{opacity:.4;pointer-events:none}
.opt-letter{width:32px;height:32px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:16px;flex-shrink:0}

/* Lobby */
.lobby-layout{display:grid;grid-template-columns:auto 1fr;gap:32px;width:100%;max-width:900px}
.join-box{background:var(--card);border-radius:24px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:220px}
.room-code{font-family:'Fredoka One',cursive;font-size:52px;color:var(--yellow);letter-spacing:6px}
#qr-img{width:130px;height:130px;border-radius:12px;background:white}
.join-url{font-size:11px;color:#666;text-align:center;word-break:break-all;max-width:180px}
.right-panel{display:flex;flex-direction:column;gap:16px}
.player-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-height:80px}
.player-chip{background:rgba(255,255,255,.05);border-radius:14px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:4px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.player-avatar{font-size:28px}
.player-name{font-size:12px;font-weight:800;text-align:center}
.game-btns{display:flex;flex-wrap:wrap;gap:10px}
.game-btn{background:var(--card);border:2px solid rgba(255,255,255,.1);color:white;padding:12px 16px;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;flex:1;min-width:100px}
.game-btn:hover{border-color:var(--purple)}
.game-btn.active{border-color:var(--pink);background:rgba(232,53,122,.15)}
.game-emoji{font-size:22px}

/* Game header */
.game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(0,0,0,.3);width:100%;position:sticky;top:0;z-index:10}
.game-name-label{font-family:'Fredoka One',cursive;font-size:20px;color:var(--yellow)}
.scoreboard{display:flex;gap:8px;overflow-x:auto;flex:1;margin:0 16px}
.score-chip{background:rgba(255,255,255,.1);border-radius:100px;padding:6px 14px;display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;white-space:nowrap}
.score-chip .pts{color:var(--yellow);font-size:11px}
.skip-btn{background:rgba(255,255,255,.1);border:none;color:#aaa;padding:8px 14px;border-radius:100px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;transition:all .2s;white-space:nowrap}
.skip-btn:hover{background:rgba(255,255,255,.2);color:white}

/* TV display (big screen view) */
.tv-area{width:100%;max-width:900px;flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0}
.big-prompt{font-family:'Fredoka One',cursive;font-size:clamp(20px,4vw,42px);text-align:center;color:var(--yellow);max-width:800px;line-height:1.2}
.phase-label{font-size:13px;text-transform:uppercase;letter-spacing:3px;color:var(--teal);font-weight:800}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:800px}
.answer-card{background:var(--card);border-radius:18px;padding:20px;display:flex;flex-direction:column;gap:6px;border:2px solid transparent;transition:all .3s}
.answer-card.reveal-correct{border-color:var(--teal);background:rgba(0,201,167,.1)}
.answer-card.reveal-wrong{opacity:.5}
.answer-author{font-size:12px;color:#888;font-weight:700}
.answer-text{font-size:clamp(14px,2.5vw,20px);font-weight:800}
.vote-bar{height:5px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden;margin-top:4px}
.vote-fill{height:100%;background:var(--yellow);border-radius:100px;transition:width 1s ease}
.vote-count{font-size:18px;font-weight:900;color:var(--yellow)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:800px}
.option-tv{background:var(--card);border-radius:14px;padding:16px 20px;font-size:clamp(13px,2vw,17px);font-weight:800;border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;transition:all .3s}
.option-tv.correct{border-color:var(--teal);background:rgba(0,201,167,.1)}
.option-tv.wrong{opacity:.4}
#tv-canvas{border-radius:16px;background:white;width:100%;max-width:500px;height:360px}
.poll-bar-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:700px}
.poll-bar-row{display:flex;flex-direction:column;gap:3px}
.poll-bar-label{font-weight:800;font-size:14px;display:flex;justify-content:space-between}
.poll-bar-track{height:18px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
.poll-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:100px;transition:width 1s ease}
.answered-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.answered-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s}
.answered-dot.done{background:var(--teal)}
.results-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:600px}
.result-row{background:var(--card);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;animation:slideIn .4s ease both}
@keyframes slideIn{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
.result-rank{font-family:'Fredoka One',cursive;font-size:28px;color:#444;width:44px}
.result-rank.gold{color:var(--yellow)}.result-rank.silver{color:#aaa}.result-rank.bronze{color:#cd7f32}
.result-avatar{font-size:30px}.result-name{font-weight:800;font-size:16px;flex:1}
.result-score{font-family:'Fredoka One',cursive;font-size:24px;color:var(--yellow)}
.status-msg{color:#888;font-size:15px;font-weight:700;text-align:center}

/* Host input area at bottom */
.host-input-area{width:100%;max-width:900px;background:var(--card);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;border:2px solid rgba(108,63,197,.4)}
.host-input-label{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--purple);font-weight:800}

/* Drawing */
#host-canvas{border-radius:16px;background:white;touch-action:none;width:100%;max-width:400px;height:280px;cursor:crosshair}
.draw-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:400px}
.color-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.color-btn.active{border-color:white}
.size-btn,.eraser-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);border-radius:100px;padding:5px 12px;cursor:pointer;color:white;font-weight:800;font-size:12px;transition:all .15s}
.size-btn.active{background:var(--purple);border-color:var(--purple)}
.eraser-btn.active{background:var(--orange);border-color:var(--orange)}

/* Rank */
.rank-list{display:flex;flex-direction:column;gap:8px;width:100%;max-width:400px}
.rank-item{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:grab;border:2px solid rgba(255,255,255,.08);font-weight:800;font-size:14px;user-select:none;transition:background .15s}
.rank-item:active{cursor:grabbing;background:rgba(108,63,197,.3)}
.rank-num{width:26px;height:26px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:13px;flex-shrink:0}
.drag-handle{color:#555;font-size:16px;margin-left:auto}
.char-count{font-size:11px;color:#666;font-weight:700}

/* Timer bar */
.timer-bar-wrap{width:100%;max-width:800px;height:6px;background:rgba(255,255,255,.1);border-radius:100px;overflow:hidden}
.timer-bar-fill{height:100%;background:var(--teal);border-radius:100px;transition:width 1s linear}

.waiting-anim{display:flex;gap:8px;justify-content:center;align-items:center}
.waiting-dot{width:10px;height:10px;border-radius:50%;background:var(--purple);animation:bounce 1s infinite}
.waiting-dot:nth-child(2){animation-delay:.2s;background:var(--pink)}
.waiting-dot:nth-child(3){animation-delay:.4s;background:var(--yellow)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.hidden{display:none!important}
.full-game{width:100%;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.elim-badge{background:rgba(232,53,122,.2);border:1px solid var(--pink);border-radius:100px;padding:3px 10px;font-size:11px;color:var(--pink);font-weight:800}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
  <h1>🎉 Party Pack</h1>
  <div class="subtitle">The Ultimate Party Game</div>

  <div id="name-setup" style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
    <input id="host-name" placeholder="Your name (you're playing too!)" maxlength="14" style="max-width:340px;text-align:center"/>
    <button class="btn btn-primary" style="max-width:340px" onclick="createRoom()">Create Room</button>
  </div>

  <div id="lobby-main" class="hidden" style="width:100%;max-width:900px">
    <div class="lobby-layout">
      <div class="join-box">
        <div class="subtitle">Room Code</div>
        <div class="room-code" id="room-code">----</div>
        <img id="qr-img" style="display:none" src="" alt="QR"/>
        <div class="join-url" id="join-url"></div>
        <div class="subtitle" style="margin-top:4px">scan to join</div>
      </div>
      <div class="right-panel">
        <div>
          <div class="subtitle" style="margin-bottom:10px">Players (<span id="player-count">0</span>/8)</div>
          <div class="player-grid" id="player-grid"></div>
        </div>
        <div>
          <div class="subtitle" style="margin-bottom:10px">Pick a Game</div>
          <div class="game-btns">
            <button class="game-btn active" onclick="selectGame('Quiplash','btn-q')" id="btn-q"><span class="game-emoji">😂</span>Quiplash</button>
            <button class="game-btn" onclick="selectGame('Fibbage','btn-f')" id="btn-f"><span class="game-emoji">🤥</span>Fibbage</button>
            <button class="game-btn" onclick="selectGame('Drawful','btn-d')" id="btn-d"><span class="game-emoji">🎨</span>Drawful</button>
            <button class="game-btn" onclick="selectGame('TriviaKnockout','btn-t')" id="btn-t"><span class="game-emoji">🧠</span>Trivia</button>
            <button class="game-btn" onclick="selectGame('PollMine','btn-p')" id="btn-p"><span class="game-emoji">📊</span>Poll Mine</button>
          </div>
        </div>
        <button class="btn btn-teal" id="start-btn" disabled onclick="startGame()">Start Game!</button>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen" style="padding:0;justify-content:flex-start">
  <div class="full-game">
    <div class="game-header">
      <div class="game-name-label" id="game-name-label">Game</div>
      <div class="scoreboard" id="scoreboard"></div>
      <button class="skip-btn" onclick="socket.emit('next_phase')">⏭ Skip</button>
    </div>

    <!-- TV area: what everyone sees -->
    <div class="tv-area" id="tv-area">
      <div class="waiting-anim"><div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div></div>
    </div>

    <!-- Host interactive input area -->
    <div class="host-input-area" id="host-input-area" style="display:none">
      <div class="host-input-label" id="host-input-label">Your turn</div>
      <div id="host-input-content"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let myId = null, myCode = null, myPlayer = null;
let selectedGame = 'Quiplash';
let players = {};
let hostCanvas, hostCtx, isDrawing = false;
let currentColor = '#222', currentSize = 4, isEraser = false;
let currentStroke = [];
let selectedVote = null;
let rankItems = [];
let timerInterval = null;

// ─── LOBBY ───
function createRoom() {
  const nickname = document.getElementById('host-name').value.trim();
  if (!nickname) { document.getElementById('host-name').style.borderColor = 'var(--pink)'; return; }
  socket.emit('create_room', { nickname });
}

socket.on('room_created', ({ code, player }) => {
  myCode = code; myPlayer = player; myId = socket.id;
  document.getElementById('name-setup').classList.add('hidden');
  document.getElementById('lobby-main').classList.remove('hidden');
  document.getElementById('room-code').textContent = code;
  fetchQR(code);
});

socket.on('room_update', ({ players: ps, phase, hostId }) => {
  players = {};
  ps.forEach(p => players[p.id] = p);
  renderLobbyPlayers(ps);
  updateScoreboard(ps);
  document.getElementById('start-btn').disabled = ps.length < 2;
  if (phase === 'lobby') showScreen('lobby');
});

function fetchQR(code) {
  fetch(`/qr/${code}`).then(r => r.json()).then(data => {
    const img = document.getElementById('qr-img');
    img.src = data.qr; img.style.display = 'block';
    document.getElementById('join-url').textContent = data.url;
  });
}

function renderLobbyPlayers(ps) {
  document.getElementById('player-count').textContent = ps.length;
  document.getElementById('player-grid').innerHTML = ps.map(p => `
    <div class="player-chip">
      <div class="player-avatar">${p.avatar}</div>
      <div class="player-name">${p.nickname}${p.isHost ? ' 👑' : ''}</div>
    </div>
  `).join('');
}

function selectGame(name, btnId) {
  selectedGame = name;
  document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btnId).classList.add('active');
}

function startGame() { socket.emit('start_game', { gameName: selectedGame }); }

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function updateScoreboard(ps) {
  const sorted = [...ps].sort((a,b) => b.score - a.score);
  document.getElementById('scoreboard').innerHTML = sorted.map(p => `
    <div class="score-chip">${p.avatar} ${p.nickname}<span class="pts">${p.score}pts</span></div>
  `).join('');
}

// ─── TV AREA HELPERS ───
function setTV(html) { document.getElementById('tv-area').innerHTML = html; }
function setHostInput(label, html, visible = true) {
  const area = document.getElementById('host-input-area');
  area.style.display = visible ? 'flex' : 'none';
  document.getElementById('host-input-label').textContent = label;
  document.getElementById('host-input-content').innerHTML = html;
}
function hideHostInput() { document.getElementById('host-input-area').style.display = 'none'; }

function answeredDots(count, total) {
  return `<div class="answered-row">${Array(total).fill(0).map((_,i) =>
    `<div class="answered-dot${i < count ? ' done' : ''}"></div>`
  ).join('')}</div>`;
}

function startTimerBar(seconds) {
  clearInterval(timerInterval);
  const fill = document.getElementById('timer-fill');
  if (!fill) return;
  let elapsed = 0;
  fill.style.width = '100%';
  timerInterval = setInterval(() => {
    elapsed++;
    const pct = Math.max(0, 100 - (elapsed / seconds * 100));
    fill.style.width = pct + '%';
    if (pct <= 0) clearInterval(timerInterval);
  }, 1000);
}

socket.on('player_answered', ({ count, total }) => {
  const dots = document.querySelector('.answered-row');
  if (dots) dots.innerHTML = Array(total).fill(0).map((_,i) =>
    `<div class="answered-dot${i < count ? ' done' : ''}"></div>`
  ).join('');
});

socket.on('vote_received', ({ count, total }) => {
  const dots = document.querySelector('.answered-row');
  if (dots) dots.innerHTML = Array(total).fill(0).map((_,i) =>
    `<div class="answered-dot${i < count ? ' done' : ''}"></div>`
  ).join('');
});

// ─── QUIPLASH ───
socket.on('quiplash_round', ({ round, totalRounds }) => {
  showScreen('game');
  document.getElementById('game-name-label').textContent = '😂 Quiplash';
  const total = Object.keys(players).length;
  setTV(`
    <div class="phase-label">Round ${round} of ${totalRounds}</div>
    <div class="big-prompt">Everyone write your funniest answer!</div>
    <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
    ${answeredDots(0, total)}
  `);
  startTimerBar(60);
  hideHostInput();
});

socket.on('your_prompt', ({ prompt, timeLimit }) => {
  setHostInput('✏️ Your Prompt', `
    <div style="color:var(--yellow);font-weight:800;font-size:15px;text-align:center;margin-bottom:8px">${prompt}</div>
    <textarea id="host-answer" placeholder="Type something funny..." maxlength="80"></textarea>
    <div class="char-count"><span id="hc-left">80</span> chars left</div>
    <button class="btn btn-primary" style="max-width:200px;font-size:18px;padding:12px" onclick="submitHostAnswer()">Submit!</button>
  `);
  document.getElementById('host-answer').addEventListener('input', function() {
    document.getElementById('hc-left').textContent = 80 - this.value.length;
  });
  startTimerBar(timeLimit);
});

function submitHostAnswer() {
  const answer = document.getElementById('host-answer').value.trim();
  if (!answer) return;
  socket.emit('game_input', { type: 'answer', answer });
  setHostInput('✅ Submitted!', `<div class="status-msg">Waiting for others to answer...</div>`, true);
}

socket.on('quiplash_vote', ({ prompt, options }) => {
  const total = Object.keys(players).length;
  setTV(`
    <div class="phase-label">Vote for the funniest!</div>
    <div class="big-prompt">${prompt}</div>
    <div class="answers-grid">
      ${options.map(o => `
        <div class="answer-card" id="tv-ans-${o.playerId}">
          <div class="answer-author">${o.avatar} ${o.nickname}</div>
          <div class="answer-text">${o.answer}</div>
          <div class="vote-bar"><div class="vote-fill" style="width:0" id="bar-${o.playerId}"></div></div>
        </div>
      `).join('')}
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
    ${answeredDots(0, total - 2)}
  `);
  startTimerBar(25);
  hideHostInput();
});

socket.on('vote_now', ({ options, prompt, timeLimit }) => {
  selectedVote = null;
  setHostInput('🗳️ Vote!', `
    <div style="color:var(--yellow);font-weight:800;font-size:13px;text-align:center;margin-bottom:8px">${prompt}</div>
    ${options.map(o => `
      <button class="btn-answer" id="vbtn-${o.playerId}" onclick="castQuiplashVote('${o.playerId}')">
        ${o.answer}
      </button>
    `).join('')}
    <div class="status-msg" id="vote-status-host"></div>
  `);
  startTimerBar(timeLimit);
});

function castQuiplashVote(playerId) {
  if (selectedVote) return;
  selectedVote = playerId;
  socket.emit('game_input', { type: 'vote', vote: playerId });
  document.querySelectorAll('[id^="vbtn-"]').forEach(b => {
    if (b.id === 'vbtn-' + playerId) b.classList.add('selected');
    else b.classList.add('disabled-opt');
  });
  document.getElementById('vote-status-host').textContent = '✅ Voted!';
}

socket.on('wait_for_votes', ({ message }) => {
  setHostInput('⏳ Hang on...', `<div class="status-msg">${message}</div>`, true);
});

socket.on('vote_results', ({ tally, players: ps }) => {
  const total = Object.values(tally).reduce((a,b) => a+b, 0);
  Object.entries(tally).forEach(([pid, count]) => {

function initHostCanvas() {
  hostCanvas = document.getElementById('host-canvas');
  if (!hostCanvas) return;
  hostCtx = hostCanvas.getContext('2d');
  hostCtx.fillStyle = 'white';
  hostCtx.fillRect(0, 0, hostCanvas.width, hostCanvas.height);
  hostCanvas.addEventListener('pointerdown', hdStart);
  hostCanvas.addEventListener('pointermove', hdMove);
  hostCanvas.addEventListener('pointerup', hdEnd);
  hostCanvas.addEventListener('pointerleave', hdEnd);
}

function getCanvasPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
    nx: (e.clientX - rect.left) / rect.width,
    ny: (e.clientY - rect.top) / rect.height
  };
}

function hdStart(e) {
  e.preventDefault(); isDrawing = true;
  const pos = getCanvasPos(e, hostCanvas);
  currentStroke = [{ x: pos.nx, y: pos.ny, color: isEraser ? 'white' : currentColor, size: isEraser ? 30 : currentSize }];
  hostCtx.beginPath();
  hostCtx.strokeStyle = isEraser ? 'white' : currentColor;
  hostCtx.lineWidth = isEraser ? 30 : currentSize;
  hostCtx.lineCap = 'round'; hostCtx.lineJoin = 'round';
  hostCtx.moveTo(pos.x, pos.y);
}

function hdMove(e) {
  if (!isDrawing) return; e.preventDefault();
  const pos = getCanvasPos(e, hostCanvas);
  currentStroke.push({ x: pos.nx, y: pos.ny, color: isEraser ? 'white' : currentColor, size: isEraser ? 30 : currentSize });
  hostCtx.lineTo(pos.x, pos.y); hostCtx.stroke();
}

function hdEnd(e) {
  if (!isDrawing) return; isDrawing = false;
  if (currentStroke.length > 1) socket.emit('game_input', { type: 'stroke', stroke: currentStroke });
  currentStroke = [];
}

function setDrawColor(c, btn) {
  currentColor = c; isEraser = false;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  const eb = document.getElementById('eraser-btn');
  if (eb) eb.classList.remove('active');
  btn.classList.add('active');
}
function setDrawSize(s, btn) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function toggleEraser(btn) {
  isEraser = !isEraser; btn.classList.toggle('active');
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
}
function clearCanvas() {
  if (hostCtx && hostCanvas) { hostCtx.fillStyle = 'white'; hostCtx.fillRect(0, 0, hostCanvas.width, hostCanvas.height); }
  socket.emit('game_input', { type: 'clear' });
}
function doneDraw() { socket.emit('game_input', { type: 'done_drawing' }); }

socket.on('new_stroke', ({ stroke }) => {
  if (!tvCtx || !stroke || stroke.length < 2) return;
  tvCtx.beginPath();
  tvCtx.strokeStyle = stroke[0].color || '#000';
  tvCtx.lineWidth = stroke[0].size || 4;
  tvCtx.lineCap = 'round'; tvCtx.lineJoin = 'round';
  tvCtx.moveTo(stroke[0].x * 500, stroke[0].y * 360);
  stroke.forEach(pt => tvCtx.lineTo(pt.x * 500, pt.y * 360));
  tvCtx.stroke();
});

let rdSrc = null;
function rdStart(e) { rdSrc = parseInt(e.currentTarget.dataset.index); }
function rdOver(e) { e.preventDefault(); }
function rdDrop(e) {

  const item = rankItems.splice(rdSrc, 1)[0];
  rankItems.splice(target, 0, item);
  rdSrc = null; renderRankList();
}

            <div class="result-avatar">${p.avatar}</div>
            <div class="result-name">${p.nickname}</div>
            <div class="result-score">${p.score}</div>
          </div>
        `).join('')}
      </div>
    `);
    hideHostInput();
  }, 1000);
});

socket.on('game_over', ({ scores }) => {
  setTimeout(() => {
    const tvArea = document.getElementById('tv-area');
    tvArea.insertAdjacentHTML('beforeend', `
      <button class="btn btn-teal" style="max-width:260px;margin-top:8px" onclick="socket.emit('return_to_lobby')">Back to Lobby</button>
    `);
  }, 3000);
});

socket.on('game_ended', ({ returnToLobby }) => {
  if (returnToLobby) showScreen('lobby');
});
</script>
</body>
</html>
